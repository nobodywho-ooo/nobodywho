name: "swift_ci"

on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full Swift CI (integration tests with model)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  tests:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    steps:
      - uses: actions/checkout@v5

      - name: "Download xcframework artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-swift-xcframework
          path: ./xcframework-zip

      - name: "Install xcframework"
        run: |
          mkdir -p nobodywho/swift/Frameworks
          unzip -o xcframework-zip/NobodyWhoNative.xcframework.zip -d nobodywho/swift/Frameworks/
          ls -la nobodywho/swift/Frameworks/NobodyWhoNative.xcframework/

      - name: "Run macro tests"
        working-directory: ./nobodywho/swift
        run: swift test --filter MacroTests

      - name: "Download test models"
        run: |
          mkdir -p test-models
          curl -L -o test-models/model.gguf \
            "https://huggingface.co/NobodyWho/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf"
          curl -L -o test-models/vision-model.gguf \
            "https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf"
          curl -L -o test-models/mmproj.gguf \
            "https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/mmproj-F16.gguf"
          # Whisper ONNX — only the files we actually load (fp32 / "default"
          # quantization, matching the STT tests' quantization="default").
          WHISPER_BASE="https://huggingface.co/onnx-community/whisper-base/resolve/main"
          mkdir -p test-models/whisper-base/onnx
          curl -L --fail "$WHISPER_BASE/onnx/encoder_model.onnx"       -o test-models/whisper-base/onnx/encoder_model.onnx
          curl -L --fail "$WHISPER_BASE/onnx/decoder_model_merged.onnx" -o test-models/whisper-base/onnx/decoder_model_merged.onnx
          curl -L --fail "$WHISPER_BASE/tokenizer.json"                 -o test-models/whisper-base/tokenizer.json
          curl -L --fail "$WHISPER_BASE/generation_config.json"         -o test-models/whisper-base/generation_config.json
          curl -L --fail "$WHISPER_BASE/config.json"                    -o test-models/whisper-base/config.json
          curl -L --fail "$WHISPER_BASE/preprocessor_config.json"       -o test-models/whisper-base/preprocessor_config.json

      - name: "Run integration tests"
        working-directory: ./nobodywho/swift
        env:
          TEST_MODEL: ${{ github.workspace }}/test-models/model.gguf
          TEST_VISION_MODEL: ${{ github.workspace }}/test-models/vision-model.gguf
          TEST_MMPROJ: ${{ github.workspace }}/test-models/mmproj.gguf
          TEST_WHISPER_MODEL: ${{ github.workspace }}/test-models/whisper-base
          TEST_AUDIO_FILE: ${{ github.workspace }}/assets/sound.mp3
        run: swift test --filter NobodyWhoTests
