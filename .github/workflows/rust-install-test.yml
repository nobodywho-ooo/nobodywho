name: "Rust crate install test"

on:        
  push:
    paths:
      - "nobodywho/rust/**"
      - "nobodywho/core/**"
      - ".github/workflows/rust-install-test.yml"
  pull_request:
    paths:
      - "nobodywho/rust/**"
      - "nobodywho/core/**"
      - ".github/workflows/rust-install-test.yml"

jobs:
  download-model:
    name: "Download model"
    runs-on: ubuntu-24.04
    steps:
      - name: Download model
        run: |
          curl -L --fail --progress-bar \
            https://huggingface.co/bartowski/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf \
            -o model.gguf

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-gguf
          path: model.gguf
          retention-days: 1

  ubuntu:
    name: "Ubuntu (apt)"
    runs-on: ubuntu-24.04
    needs: download-model
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev build-essential \
            libvulkan-dev libshaderc-dev glslc vulkan-tools

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model-gguf

      - name: Smoke test
        working-directory: nobodywho
        env:
          TEST_MODEL: ${{ github.workspace }}/model.gguf
        run: cargo test -p nobodywho-rust test_blocking_completed -- --nocapture --test-threads=1

  macos:
    name: "macOS"
    runs-on: macos-latest
    needs: download-model
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install libomp
        run: brew install libomp

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model-gguf

      - name: Smoke test
        working-directory: nobodywho
        env:
          TEST_MODEL: ${{ github.workspace }}/model.gguf
        run: |
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++
          export LDFLAGS="-L$(brew --prefix libomp)/lib"
          export CPPFLAGS="-I$(brew --prefix libomp)/include"
          cargo test -p nobodywho-rust test_blocking_completed -- --nocapture --test-threads=1

  windows:
    name: "Windows"
    runs-on: windows-latest
    needs: download-model
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        shell: bash

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk -y

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model-gguf

      - name: Smoke test
        working-directory: nobodywho
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/lib
          TEST_MODEL: ${{ github.workspace }}\model.gguf
        run: cargo test -p nobodywho-rust test_blocking_completed -- --nocapture --test-threads=1

  nix:
    name: "Nix"
    runs-on: ubuntu-24.04
    needs: download-model
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Download model
        uses: actions/download-artifact@v4
        with:
          name: model-gguf

      - name: Smoke test inside nix shell
        run: |
          nix-shell nobodywho/shell.nix --run \
            "cd nobodywho && TEST_MODEL=${{ github.workspace }}/model.gguf cargo test -p nobodywho-rust test_blocking_completed -- --nocapture --test-threads=1"
