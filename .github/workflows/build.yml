name: "Build"
on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full build matrix (all platforms, all targets, all profiles)."
        type: boolean
        default: false

jobs:
  cargo-build-linux:
    if: inputs.full_ci
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-unknown-linux-gnu"
          - "aarch64-unknown-linux-gnu"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
        include:
          - target: x86_64-unknown-linux-gnu
            runner: warp-ubuntu-latest-x64-4x
          - target: aarch64-unknown-linux-gnu
            runner: warp-ubuntu-latest-arm64-4x

    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.runner == 'warp-ubuntu-latest-x64-4x' && '-C target-cpu=x86-64-v3' || '' }}
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Install Vulkan dependencies for Linux builds"
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake
          sudo apt-get install libshaderc-dev libvulkan-dev glslc

      - name: "Setup Flutter SDK (manual for ARM64)"
        if: matrix.integration == 'flutter' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.35.5 --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          ./flutter/bin/flutter doctor

      - name: "Setup Flutter SDK (action for x64)"
        if: matrix.integration == 'flutter' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: "Compile for linux"
        run: cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho

      - name: "Rename built file"
        run: |
          cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so

  cargo-build-windows:
    if: inputs.full_ci
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-pc-windows-msvc"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    env:
      RUSTFLAGS: >-
        -l Advapi32
        -C target-cpu=x86-64-v3
      # Fetch git deps + submodules with the git CLI instead of libgit2. libgit2
      # ignores core.longpaths, so the deeply nested llama.cpp tools/ui/ paths
      # blow past Windows' 260-char MAX_PATH during the submodule checkout. The
      # git CLI honors core.longpaths (set below) and uses \\?\ extended paths.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          # 1.4.313.2 matches llama.cpp's own Windows Vulkan CI. The newer
          # ggml-vulkan backend does find_package(SPIRV-Headers CONFIG REQUIRED)
          # (llama.cpp PR #22009 / #23215), and SPIRV-HeadersConfig.cmake is only
          # bundled in the SDK from ~1.4.313+. Older SDKs (1.3.296, 1.4.304) lack
          # it, so configure fails. Discovery works via the VULKAN_SDK env var
          # this action sets. stripdown only deletes Demos/Helpers/Licenses/etc.,
          # never the cmake config, so it's safe to keep.
          vulkan_version: 1.4.313.2
          cache: true
          install_runtime: true
          stripdown: true

      - name: Install Ninja
        run: choco install ninja

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: Build with Cargo
        # move things into a shortly-named dir in the root, because windows is made by fuckwits who think limiting paths to 260 chars is ok
        run: |
          mv ./nobodywho/* C:/
          # Allow >260-char paths so cargo's git CLI can check out the deep
          # llama.cpp tools/ui/ submodule files (see CARGO_NET_GIT_FETCH_WITH_CLI).
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true
          cd C:/
          # Use an even shorter target directory to avoid path length issues with git dependencies
          cargo build -p nobodywho-${{ matrix.integration }} --target ${{ matrix.target }} --verbose ${{ matrix.profile == 'release' && '--release' || '' }} --locked --target-dir C:/t
        env:
          NOBODYWHO_SKIP_CODEGEN: "1"
          RUSTFLAGS: >-
            -l Advapi32
            -C debuginfo=0
          # Use Ninja generator instead of Visual Studio generator.
          # This fixes a CMake ExternalProject issue where vulkan-shaders-gen's
          # install step fails to find cmake_install.cmake with the VS generator.
          # Ninja's simpler build structure avoids this problem entirely.
          CMAKE_GENERATOR: "Ninja"

      - name: "Rename built files"
        run: |
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/nobodywho_${{ matrix.integration }}.dll ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dll
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/nobodywho_${{ matrix.integration }}.pdb ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.pdb

      - name: "Upload build artifacts"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dll
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.pdb

  cargo-build-macos:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-apple-darwin"
          - "aarch64-apple-darwin"
          - "aarch64-apple-ios"
          - "aarch64-apple-ios-sim"
          - "aarch64-apple-visionos"
          - "aarch64-apple-visionos-sim"
          - "aarch64-apple-watchos"
          - "aarch64-apple-watchos-sim"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # uniffi doesn't need macOS x86_64 (Intel Macs are EOL)
          - integration: "uniffi"
            target: "x86_64-apple-darwin"
          # godot and flutter only support macOS and iOS
          - integration: "godot"
            target: "aarch64-apple-visionos"
          - integration: "godot"
            target: "aarch64-apple-visionos-sim"
          - integration: "godot"
            target: "aarch64-apple-watchos"
          - integration: "godot"
            target: "aarch64-apple-watchos-sim"
          - integration: "flutter"
            target: "aarch64-apple-visionos"
          - integration: "flutter"
            target: "aarch64-apple-visionos-sim"
          - integration: "flutter"
            target: "aarch64-apple-watchos"
          - integration: "flutter"
            target: "aarch64-apple-watchos-sim"
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    steps:
      - uses: actions/checkout@v5
      - name: "Setup Rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }} || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Setup Rust nightly for tier 3 targets"
        if: contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos')
        run: |
          rustup toolchain install nightly
          rustup +nightly component add rust-src

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: "Clean target dir"
        # Self-hosted runners persist the workspace between runs; clean to avoid stale build artifacts.
        run: cargo clean
        working-directory: ./nobodywho

      # ort-sys has no prebuilt for x86_64-apple-darwin (pyke only ships aarch64 Apple).
      # Pull Microsoft's official tgz so static linking finds libonnxruntime.a.
      # Version must match ort-sys's pyke distribution (ms@1.24.2 — see ort-sys/build/download/dist.txt).
      - name: "Fetch ONNX Runtime for x86_64-apple-darwin"
        if: matrix.target == 'x86_64-apple-darwin'
        id: ort-macos-x64
        run: |
          ORT_VERSION=1.24.2
          ORT_DIR="$RUNNER_TEMP/ort-macos-x64"
          mkdir -p "$ORT_DIR"
          curl -L --fail -o /tmp/onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          tar -xzf /tmp/onnxruntime.tgz --strip-components=1 -C "$ORT_DIR"
          echo "ort_dir=$ORT_DIR/lib" >> "$GITHUB_OUTPUT"

      - name: "Build (stable targets)"
        if: "!contains(matrix.target, 'visionos') && !contains(matrix.target, 'watchos')"
        # ORT_LIB_PATH only set for x86_64-apple-darwin; other Apple targets use pyke prebuilts or xcframework.
        run: |
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            export ORT_LIB_PATH="${{ steps.ort-macos-x64.outputs.ort_dir }}"
          fi
          cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "18.5"

      # visionOS / watchOS have no prebuilt ORT anywhere — build from source with Microsoft's build.py.
      # ~17 min on Apple Silicon; cached by ORT version + target so reruns hit the cache.
      - name: "Cache ONNX Runtime visionOS build"
        if: contains(matrix.target, 'visionos')
        id: cache-ort-visionos
        uses: actions/cache@v5
        with:
          path: /tmp/ort-visionos-build
          key: ort-visionos-v1.24.2-${{ contains(matrix.target, '-sim') && 'sim' || 'device' }}

      - name: "Cache ONNX Runtime watchOS build"
        if: contains(matrix.target, 'watchos')
        id: cache-ort-watchos
        uses: actions/cache@v5
        with:
          path: /tmp/ort-watchos-build
          key: ort-watchos-v1.24.2-${{ contains(matrix.target, '-sim') && 'sim' || 'device' }}

      - name: "Build ONNX Runtime for visionOS"
        if: contains(matrix.target, 'visionos') && steps.cache-ort-visionos.outputs.cache-hit != 'true'
        run: |
          if [[ "${{ matrix.target }}" == *"-sim" ]]; then
            SYSROOT=xrsimulator
          else
            SYSROOT=xros
          fi
          git clone --recursive https://github.com/microsoft/onnxruntime --branch v1.24.2 --depth 1 /tmp/ort-src
          cd /tmp/ort-src
          python3 tools/ci_build/build.py \
            --build_dir /tmp/ort-visionos-build \
            --config Release --skip_tests --skip_submodule_sync \
            --visionos --apple_sysroot "$SYSROOT" \
            --apple_deploy_target 1.0 --osx_arch arm64 \
            --use_xcode --parallel

      # watchOS uses --visionos with an overriding toolchain + cmake defines.
      # Patch: ORT's providers_shared cmake guard excludes Darwin|iOS|visionOS|tvOS but forgot watchOS.
      - name: "Build ONNX Runtime for watchOS"
        if: contains(matrix.target, 'watchos') && steps.cache-ort-watchos.outputs.cache-hit != 'true'
        run: |
          if [[ "${{ matrix.target }}" == *"-sim" ]]; then
            SYSROOT=watchsimulator
          else
            SYSROOT=watchos
          fi
          git clone --recursive https://github.com/microsoft/onnxruntime --branch v1.24.2 --depth 1 /tmp/ort-src-watchos
          cd /tmp/ort-src-watchos
          # Add watchOS to the platform exclusion regex so providers_shared isn't built.
          sed -i.bak 's#"Darwin|iOS|visionOS|tvOS"#"Darwin|iOS|visionOS|tvOS|watchOS"#' \
            cmake/onnxruntime_providers_cpu.cmake
          # Custom toolchain forcing CMAKE_SYSTEM_NAME=watchOS.
          cat > cmake/onnxruntime_watchos.toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME watchOS CACHE STRING "" FORCE)
          set(CMAKE_SYSTEM_PROCESSOR arm64 CACHE STRING "" FORCE)
          if (NOT DEFINED CMAKE_XCODE_ATTRIBUTE_DEVELOPMENT_TEAM AND NOT DEFINED CMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY)
            set(CMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED NO)
          endif()
          set(CMAKE_XCODE_ATTRIBUTE_CLANG_ENABLE_MODULES "YES")
          set(CMAKE_XCODE_ATTRIBUTE_CLANG_ENABLE_OBJC_ARC "YES")
          EOF
          python3 tools/ci_build/build.py \
            --build_dir /tmp/ort-watchos-build \
            --config Release --skip_tests --skip_submodule_sync \
            --visionos \
            --visionos_toolchain_file ../cmake/onnxruntime_watchos.toolchain.cmake \
            --apple_sysroot "$SYSROOT" \
            --apple_deploy_target 11.0 --osx_arch arm64 \
            --use_xcode \
            --cmake_extra_defines CMAKE_SYSTEM_NAME=watchOS CMAKE_MACOSX_BUNDLE=OFF onnxruntime_BUILD_UNIT_TESTS=OFF \
            --parallel

      - name: "Build (nightly tier 3 targets)"
        if: contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos')
        # `Release-{xros,xrsimulator,watchos,watchsimulator}` is Xcode's per-configuration subdir;
        # ort-sys finds the static libs there and _deps via base.parent()/_deps.
        run: |
          if [[ "${{ matrix.target }}" == *"visionos"* ]]; then
            if [[ "${{ matrix.target }}" == *"-sim" ]]; then
              export ORT_LIB_PATH=/tmp/ort-visionos-build/Release/Release-xrsimulator
            else
              export ORT_LIB_PATH=/tmp/ort-visionos-build/Release/Release-xros
            fi
          elif [[ "${{ matrix.target }}" == *"watchos"* ]]; then
            if [[ "${{ matrix.target }}" == *"-sim" ]]; then
              export ORT_LIB_PATH=/tmp/ort-watchos-build/Release/Release-watchsimulator
            else
              export ORT_LIB_PATH=/tmp/ort-watchos-build/Release/Release-watchos
            fi
          fi
          cargo +nightly build -p nobodywho-${{ matrix.integration }} -Z build-std --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }}
        working-directory: ./nobodywho

      - name: "Rename built file"
        run: |
          if [ "${{ matrix.integration }}" = "uniffi" ]; then
            # Static library (.a) for xcframeworks (React Native, Swift)
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.a \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.a
            # Dynamic library (.dylib) for macOS desktop JNA (Kotlin JVM)
            if [ -f ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib ]; then
              cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib \
                ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dylib
            fi
          else
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dylib
          fi

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          # wildcard path to match both .dylib and .a
          path: ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.*

  # builds an "xcframework"
  # which is an apple thing that contains binaries for multiple systems
  build-flutter-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download all build artifacts"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho-flutter-*-apple-*
          merge-multiple: true

      - name: Build XCFramework
        run: |
          # Create Info.plist template (will be copied to each framework)
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>nobodywho_flutter</string>
              <key>CFBundleIdentifier</key>
              <string>ooo.nobodywho.flutter</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>nobodywho_flutter</string>
              <key>CFBundlePackageType</key>
              <string>FMWK</string>
              <key>CFBundleVersion</key>
              <string>1</string>
          </dict>
          </plist>
          EOF

          # iOS simulator (aarch64 only, no lipo needed in CI)
          mkdir -p ios-sim/nobodywho_flutter.framework
          cp libnobodywho-flutter-aarch64-apple-ios-sim-release.dylib ios-sim/nobodywho_flutter.framework/nobodywho_flutter
          install_name_tool -id @rpath/nobodywho_flutter.framework/nobodywho_flutter ios-sim/nobodywho_flutter.framework/nobodywho_flutter
          cp Info.plist ios-sim/nobodywho_flutter.framework/

          # macOS universal binary (versioned framework structure required for macOS deep bundles)
          lipo -create -output macos-universal.dylib \
            libnobodywho-flutter-aarch64-apple-darwin-release.dylib \
            libnobodywho-flutter-x86_64-apple-darwin-release.dylib
          mkdir -p macos/nobodywho_flutter.framework/Versions/A/Resources
          cp macos-universal.dylib macos/nobodywho_flutter.framework/Versions/A/nobodywho_flutter
          install_name_tool -id @rpath/nobodywho_flutter.framework/nobodywho_flutter macos/nobodywho_flutter.framework/Versions/A/nobodywho_flutter
          cp Info.plist macos/nobodywho_flutter.framework/Versions/A/Resources/
          ln -sf A macos/nobodywho_flutter.framework/Versions/Current
          ln -sf Versions/Current/nobodywho_flutter macos/nobodywho_flutter.framework/nobodywho_flutter
          ln -sf Versions/Current/Resources macos/nobodywho_flutter.framework/Resources

          # iOS device (arm64)
          mkdir -p ios-device/nobodywho_flutter.framework
          cp libnobodywho-flutter-aarch64-apple-ios-release.dylib ios-device/nobodywho_flutter.framework/nobodywho_flutter
          install_name_tool -id @rpath/nobodywho_flutter.framework/nobodywho_flutter ios-device/nobodywho_flutter.framework/nobodywho_flutter
          cp Info.plist ios-device/nobodywho_flutter.framework/

          # Create xcframework with dynamic frameworks
          xcodebuild -create-xcframework \
                  -framework ios-sim/nobodywho_flutter.framework \
                  -framework macos/nobodywho_flutter.framework \
                  -framework ios-device/nobodywho_flutter.framework \
                  -output nobodywho_flutter.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r nobodywho_flutter.xcframework.zip nobodywho_flutter.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-flutter-xcframework
          path: ./nobodywho_flutter.xcframework.zip

  # builds an xcframework containing static libraries for React Native iOS
  build-react-native-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download uniffi iOS artifacts"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho-uniffi-*-apple-ios*-release
          merge-multiple: true

      - name: "List downloaded artifacts"
        run: ls -la libnobodywho-uniffi-*

      - name: "Build XCFramework from static libraries"
        run: |
          mkdir -p device sim
          cp libnobodywho-uniffi-aarch64-apple-ios-release.a device/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-ios-sim-release.a sim/libnobodywho_uniffi.a
          xcodebuild -create-xcframework \
            -library device/libnobodywho_uniffi.a \
            -library sim/libnobodywho_uniffi.a \
            -output NobodywhoFramework.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r NobodywhoFramework.xcframework.zip NobodywhoFramework.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-react-native-xcframework
          path: ./NobodywhoFramework.xcframework.zip

  # builds an xcframework containing static libraries + headers for Swift SPM
  build-swift-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download uniffi Apple artifacts"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho-uniffi-*-apple-*-release
          merge-multiple: true

      - name: "List downloaded artifacts"
        run: ls -la libnobodywho-uniffi-*

      - name: "Build XCFramework with headers"
        run: |
          mkdir -p ios-device/Headers ios-sim/Headers macos/Headers \
                   visionos-device/Headers visionos-sim/Headers \
                   watchos-device/Headers watchos-sim/Headers

          cp libnobodywho-uniffi-aarch64-apple-ios-release.a ios-device/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-ios-sim-release.a ios-sim/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-darwin-release.a macos/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-visionos-release.a visionos-device/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-visionos-sim-release.a visionos-sim/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-watchos-release.a watchos-device/libnobodywho_uniffi.a
          cp libnobodywho-uniffi-aarch64-apple-watchos-sim-release.a watchos-sim/libnobodywho_uniffi.a

          for dir in ios-device ios-sim macos visionos-device visionos-sim watchos-device watchos-sim; do
            cp nobodywho/swift/generated/nobodywhoFFI.h $dir/Headers/
            cp nobodywho/swift/generated/nobodywhoFFI.modulemap $dir/Headers/module.modulemap
          done

          xcodebuild -create-xcframework \
            -library ios-device/libnobodywho_uniffi.a -headers ios-device/Headers \
            -library ios-sim/libnobodywho_uniffi.a -headers ios-sim/Headers \
            -library macos/libnobodywho_uniffi.a -headers macos/Headers \
            -library visionos-device/libnobodywho_uniffi.a -headers visionos-device/Headers \
            -library visionos-sim/libnobodywho_uniffi.a -headers visionos-sim/Headers \
            -library watchos-device/libnobodywho_uniffi.a -headers watchos-device/Headers \
            -library watchos-sim/libnobodywho_uniffi.a -headers watchos-sim/Headers \
            -output NobodyWhoNative.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r NobodyWhoNative.xcframework.zip NobodyWhoNative.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-swift-xcframework
          path: ./NobodyWhoNative.xcframework.zip

  cargo-build-android:
    if: inputs.full_ci
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      fail-fast: false
      matrix:
        target:
          - "aarch64-linux-android"
          - "x86_64-linux-android"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: "Install distro dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc gcc-multilib

      - name: "Install Android NDK"
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          add-to-path: false

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      # ort-sys has no prebuilt for x86_64-linux-android (pyke only ships arm64).
      # Pull Microsoft's official Android AAR (which has x86_64) and point ort-sys at it.
      # Version must match ort-sys's pyke distribution (ms@1.24.2 — see ort-sys/build/download/dist.txt).
      - name: "Fetch ONNX Runtime for x86_64-linux-android"
        if: matrix.target == 'x86_64-linux-android'
        id: ort-android
        run: |
          ORT_VERSION=1.24.2
          ORT_DIR="$RUNNER_TEMP/ort-android-x86_64/lib"
          mkdir -p "$ORT_DIR"
          curl -L --fail -o /tmp/onnxruntime.aar \
            "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${ORT_VERSION}/onnxruntime-android-${ORT_VERSION}.aar"
          unzip -j -o /tmp/onnxruntime.aar 'jni/x86_64/libonnxruntime.so' -d "$ORT_DIR"
          echo "ort_dir=$ORT_DIR" >> "$GITHUB_OUTPUT"

      - name: "Compile for android"
        # ORT_LIB_PATH/ORT_PREFER_DYNAMIC_LINK only set when ort-android step ran (x86_64);
        # exporting them empty on arm64 would put ort-sys into manual-link mode with no path.
        run: |
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            export ORT_LIB_PATH="${{ steps.ort-android.outputs.ort_dir }}"
            export ORT_PREFER_DYNAMIC_LINK=1
          fi
          cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho
        env:
          ANDROID_NDK: "${{ steps.setup-ndk.outputs.ndk-path }}"
          # aarch64 (arm64-v8a)
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CC_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"
          CXX_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++"
          AR_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          # x86_64
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android34-clang"
          CARGO_TARGET_X86_64_LINUX_ANDROID_AR: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CC_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android31-clang"
          CXX_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android31-clang++"
          AR_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

        # XXX: .so files for android in godot MUST start with "lib"
      - name: "Rename built file"
        run: |
          if [ "${{ matrix.integration }}" = "uniffi" ]; then
            # uniffi produces both static (.a) for React Native/Swift and shared (.so) for Kotlin/JNA
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.a \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.a
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
          else
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
          fi
          # x86_64 Android links dynamically against libonnxruntime.so — ship it alongside.
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            cp "${{ steps.ort-android.outputs.ort_dir }}/libonnxruntime.so" ./libonnxruntime.so
          fi

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.*
            ./libonnxruntime.so
