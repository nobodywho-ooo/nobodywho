name: "Build"
on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full build matrix (all platforms, all targets, all profiles)."
        type: boolean
        default: false

jobs:
  cargo-build-linux:
    if: inputs.full_ci
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-unknown-linux-gnu"
          - "aarch64-unknown-linux-gnu"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
        include:
          - target: x86_64-unknown-linux-gnu
            runner: warp-ubuntu-latest-x64-4x
          - target: aarch64-unknown-linux-gnu
            runner: warp-ubuntu-latest-arm64-4x

    runs-on: ${{ matrix.runner }}
    env:
      # `-Wl,-rpath,$ORIGIN` makes each artifact search its own directory for the
      # dynamically-linked ggml/llama libs (dynamic-link feature). It must be set
      # here rather than only in .cargo/config.toml because Cargo ignores config
      # rustflags whenever RUSTFLAGS is set in the environment (which it is here).
      RUSTFLAGS: ${{ matrix.runner == 'warp-ubuntu-latest-x64-4x' && '-C target-cpu=x86-64-v3 -C link-arg=-Wl,-rpath,$ORIGIN' || '-C link-arg=-Wl,-rpath,$ORIGIN' }}
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Install Vulkan dependencies for Linux builds"
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake
          sudo apt-get install libshaderc-dev libvulkan-dev glslc
          # patchelf: normalize the dynamic ggml/llama SONAMEs to unversioned names
          sudo apt-get install -y patchelf

      - name: "Setup Flutter SDK (manual for ARM64)"
        if: matrix.integration == 'flutter' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.35.5 --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          ./flutter/bin/flutter doctor

      - name: "Setup Flutter SDK (action for x64)"
        if: matrix.integration == 'flutter' && matrix.target == 'x86_64-unknown-linux-gnu'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: "Compile for linux"
        run: cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho

      - name: "Rename built file"
        run: |
          cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
          # dynamic-link: ship the shared ggml/llama libs alongside the binding.
          # On Linux these carry versioned SONAMEs (e.g. libggml-cpu.so.0), and the
          # fork only hard-links the unversioned *.so into the target dir — the real
          # versioned files (which DT_NEEDED references) live in the CMake build
          # output dir. Find every ggml/llama .so under the profile dir and copy the
          # real files (dereferenced) so the SONAME-named files are shipped too.
          find "./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}" \
            \( -name 'libggml*.so*' -o -name 'libllama*.so*' \) \
            -exec cp -L -n {} ./ \;
          # Normalize to unversioned SONAMEs and repoint the binding's DT_NEEDED,
          # so consumers reference libggml.so (not libggml.so.0). Runs on ./ where
          # both the binding cdylib and the ggml/llama libs are now staged.
          bash nobodywho/scripts/unversion-elf-libs.sh ./

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
            ./libggml*.so
            ./libllama*.so

  cargo-build-windows:
    if: inputs.full_ci
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-pc-windows-msvc"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    env:
      RUSTFLAGS: >-
        -l Advapi32
        -C target-cpu=x86-64-v3
      # Fetch git deps + submodules with the git CLI instead of libgit2. libgit2
      # ignores core.longpaths, so the deeply nested llama.cpp tools/ui/ paths
      # blow past Windows' 260-char MAX_PATH during the submodule checkout. The
      # git CLI honors core.longpaths (set below) and uses \\?\ extended paths.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          # 1.4.313.2 matches llama.cpp's own Windows Vulkan CI. The newer
          # ggml-vulkan backend does find_package(SPIRV-Headers CONFIG REQUIRED)
          # (llama.cpp PR #22009 / #23215), and SPIRV-HeadersConfig.cmake is only
          # bundled in the SDK from ~1.4.313+. Older SDKs (1.3.296, 1.4.304) lack
          # it, so configure fails. Discovery works via the VULKAN_SDK env var
          # this action sets. stripdown only deletes Demos/Helpers/Licenses/etc.,
          # never the cmake config, so it's safe to keep.
          vulkan_version: 1.4.313.2
          cache: true
          install_runtime: true
          stripdown: true

      - name: Install Ninja
        run: choco install ninja

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: Build with Cargo
        # move things into a shortly-named dir in the root, because windows is made by fuckwits who think limiting paths to 260 chars is ok
        run: |
          mv ./nobodywho/* C:/
          # Allow >260-char paths so cargo's git CLI can check out the deep
          # llama.cpp tools/ui/ submodule files (see CARGO_NET_GIT_FETCH_WITH_CLI).
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true
          cd C:/
          # Use an even shorter target directory to avoid path length issues with git dependencies
          cargo build -p nobodywho-${{ matrix.integration }} --target ${{ matrix.target }} --verbose ${{ matrix.profile == 'release' && '--release' || '' }} --locked --target-dir C:/t
        env:
          NOBODYWHO_SKIP_CODEGEN: "1"
          RUSTFLAGS: >-
            -l Advapi32
            -C debuginfo=0
          # Use Ninja generator instead of Visual Studio generator.
          # This fixes a CMake ExternalProject issue where vulkan-shaders-gen's
          # install step fails to find cmake_install.cmake with the VS generator.
          # Ninja's simpler build structure avoids this problem entirely.
          CMAKE_GENERATOR: "Ninja"

      - name: "Rename built files"
        run: |
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/nobodywho_${{ matrix.integration }}.dll ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dll
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/nobodywho_${{ matrix.integration }}.pdb ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.pdb
          # dynamic-link: ship the ggml/llama DLLs alongside the binding. On
          # Windows the loader searches the loading module's own directory for its
          # imports, so co-locating them next to the binding DLL resolves them.
          # (No `lib` prefix on MSVC: ggml.dll, ggml-base.dll, ggml-vulkan.dll, llama.dll, ...)
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/ggml*.dll ./ 2>$null
          cp C:/t/${{ matrix.target }}/${{ matrix.profile }}/llama*.dll ./ 2>$null

      - name: "Upload build artifacts"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dll
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.pdb
            ./ggml*.dll
            ./llama*.dll

  cargo-build-macos:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-apple-darwin"
          - "aarch64-apple-darwin"
          - "aarch64-apple-ios"
          - "aarch64-apple-ios-sim"
          - "aarch64-apple-visionos"
          - "aarch64-apple-visionos-sim"
          - "aarch64-apple-watchos"
          - "aarch64-apple-watchos-sim"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # uniffi doesn't need macOS x86_64 (Intel Macs are EOL)
          - integration: "uniffi"
            target: "x86_64-apple-darwin"
          # godot and flutter only support macOS and iOS
          - integration: "godot"
            target: "aarch64-apple-visionos"
          - integration: "godot"
            target: "aarch64-apple-visionos-sim"
          - integration: "godot"
            target: "aarch64-apple-watchos"
          - integration: "godot"
            target: "aarch64-apple-watchos-sim"
          - integration: "flutter"
            target: "aarch64-apple-visionos"
          - integration: "flutter"
            target: "aarch64-apple-visionos-sim"
          - integration: "flutter"
            target: "aarch64-apple-watchos"
          - integration: "flutter"
            target: "aarch64-apple-watchos-sim"
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    steps:
      - uses: actions/checkout@v5
      - name: "Setup Rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }} || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Setup Rust nightly for tier 3 targets"
        if: contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos')
        run: |
          rustup toolchain install nightly
          rustup +nightly component add rust-src

      # ORT's build.py uses `match` statements; needs Python 3.10+. Self-hosted mac
      # runner's default python3 may be older. setup-python fails on self-hosted
      # (writes to /Users/runner which doesn't exist), so install via brew.
      - name: "Setup Python for ORT source build"
        if: contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos') || matrix.target == 'x86_64-apple-darwin'
        env:
          # Self-hosted brew was not installed via the official installer, so
          # `brew update` fails with `update-report should not be called
          # directly!`. Skip auto-update — the formula is already pinned.
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install python@3.13
          echo "/opt/homebrew/opt/python@3.13/libexec/bin" >> $GITHUB_PATH

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: "Clean target dir"
        # Self-hosted runners persist the workspace between runs; clean to avoid stale build artifacts.
        run: cargo clean
        working-directory: ./nobodywho

      # Build ORT for targets where pyke ships no prebuilts: x86_64 macOS
      # (MS dropped Intel Mac in 1.20+) and visionOS/watchOS device + sim
      # (no upstream prebuilts anywhere). The action caches by target+version,
      # so reruns hit the cache.
      - name: "Build ONNX Runtime"
        if: matrix.target == 'x86_64-apple-darwin' || contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos')
        id: ort
        uses: ./.github/actions/build-ort
        with:
          target: ${{ matrix.target }}

      - name: "Build (stable targets)"
        if: "!contains(matrix.target, 'visionos') && !contains(matrix.target, 'watchos')"
        run: |
          if [ -n "${{ steps.ort.outputs.lib_path }}" ]; then
            export ORT_LIB_PATH="${{ steps.ort.outputs.lib_path }}"
          fi
          cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "18.5"

      - name: "Build (nightly tier 3 targets)"
        if: contains(matrix.target, 'visionos') || contains(matrix.target, 'watchos')
        run: |
          export ORT_LIB_PATH="${{ steps.ort.outputs.lib_path }}"
          TARGET="${{ matrix.target }}"
          # The built-in aarch64-apple-watchos (device) target spec ships with
          # dynamic-linking disabled, so cargo silently drops the cdylib crate-type
          # and emits only a static .a — useless under dynamic-link, where ggml/llama
          # live in separate dylibs. The spec is otherwise identical to the watchOS
          # simulator's (has-rpath, dll-suffix .dylib, is-like-darwin), and watchOS 6+
          # supports embedded dynamic frameworks, so derive a spec with
          # dynamic-linking flipped on and build against that. Naming the JSON exactly
          # aarch64-apple-watchos.json keeps cargo emitting into
          # target/aarch64-apple-watchos/, matching the rename/upload/xcframework steps.
          ZFLAGS=""
          if [ "$TARGET" = "aarch64-apple-watchos" ]; then
            rustc +nightly -Z unstable-options --target aarch64-apple-watchos \
              --print target-spec-json \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); d["dynamic-linking"]=True; d.pop("metadata",None); json.dump(d, open("aarch64-apple-watchos.json","w"))'
            TARGET="$(pwd)/aarch64-apple-watchos.json"
            # nightly gates building against a .json target spec behind this flag.
            ZFLAGS="-Z json-target-spec"
          fi
          cargo +nightly build -p nobodywho-${{ matrix.integration }} -Z build-std $ZFLAGS --verbose --target "$TARGET" ${{ matrix.profile == 'release' && '--release' || '' }}
        working-directory: ./nobodywho

      - name: "Rename built file"
        run: |
          if [ "${{ matrix.integration }}" = "uniffi" ]; then
            # Static library (.a) for xcframeworks (React Native, Swift)
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.a \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.a
            # Dynamic library (.dylib) for macOS desktop JNA (Kotlin JVM)
            if [ -f ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib ]; then
              cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib \
                ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dylib
            fi
          else
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.dylib \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.dylib
          fi
          # dynamic-link: ship the shared ggml/llama libs alongside the binding.
          # Glob covers libggml, libggml-base, libggml-cpu, libggml-metal,
          # libllama and libllama-common (versioned dylibs + their symlinks).
          # -P preserves the symlink chain (libX.dylib -> libX.0.dylib -> libX.0.N.dylib).
          # No-op for the static-only uniffi .a slices, which have no sibling dylibs.
          cp -P ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libggml*.dylib ./ 2>/dev/null || true
          cp -P ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libllama*.dylib ./ 2>/dev/null || true

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          # wildcard path to match both .dylib and .a
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.*
            ./libggml*.dylib
            ./libllama*.dylib

  # builds an "xcframework"
  # which is an apple thing that contains binaries for multiple systems
  build-flutter-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download all build artifacts"
        uses: actions/download-artifact@v5
        with:
          # No merge-multiple: embedded ggml dylibs have generic names and would
          # collide across slices if merged.
          pattern: nobodywho-flutter-*-apple-*
          path: artifacts

      - name: Build XCFramework
        run: |
          # Dynamic frameworks with the ggml/llama dylibs embedded (dynamic-link).
          # No FFI modulemap: flutter_rust_bridge links the framework binary directly.
          HELPER=nobodywho/scripts/make-apple-framework.sh
          ios_sim=artifacts/nobodywho-flutter-aarch64-apple-ios-sim-release
          ios_dev=artifacts/nobodywho-flutter-aarch64-apple-ios-release
          dar_arm=artifacts/nobodywho-flutter-aarch64-apple-darwin-release
          dar_x64=artifacts/nobodywho-flutter-x86_64-apple-darwin-release

          # iOS simulator / device (single arch)
          bash "$HELPER" "$ios_sim" libnobodywho-flutter-aarch64-apple-ios-sim-release.dylib \
            nobodywho_flutter flat ios-sim ""  ooo.nobodywho.flutter
          bash "$HELPER" "$ios_dev" libnobodywho-flutter-aarch64-apple-ios-release.dylib \
            nobodywho_flutter flat ios-device "" ooo.nobodywho.flutter

          # macOS universal: lipo the main dylib AND every embedded ggml/llama dylib
          # across both arches into one dir, then assemble a versioned framework.
          mkdir -p universal-src
          lipo -create -output universal-src/libnobodywho_flutter.dylib \
            "$dar_arm/libnobodywho-flutter-aarch64-apple-darwin-release.dylib" \
            "$dar_x64/libnobodywho-flutter-x86_64-apple-darwin-release.dylib"
          for f in "$dar_arm"/libggml*.0.dylib "$dar_arm"/libllama*.0.dylib; do
            b=$(basename "$f")
            lipo -create -output "universal-src/$b" "$dar_arm/$b" "$dar_x64/$b"
          done
          bash "$HELPER" universal-src libnobodywho_flutter.dylib \
            nobodywho_flutter versioned macos "" ooo.nobodywho.flutter

          xcodebuild -create-xcframework \
                  -framework ios-sim/nobodywho_flutter.framework \
                  -framework macos/nobodywho_flutter.framework \
                  -framework ios-device/nobodywho_flutter.framework \
                  -output nobodywho_flutter.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r nobodywho_flutter.xcframework.zip nobodywho_flutter.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-flutter-xcframework
          path: ./nobodywho_flutter.xcframework.zip

  # builds an xcframework containing static libraries for React Native iOS
  build-react-native-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download uniffi iOS artifacts"
        uses: actions/download-artifact@v5
        with:
          # No merge-multiple: embedded ggml dylibs have generic names and would
          # collide across the device/sim slices if merged.
          pattern: nobodywho-uniffi-*-apple-ios*-release
          path: artifacts

      - name: "Build dynamic-framework XCFramework"
        run: |
          # Dynamic frameworks with ggml/llama embedded. No FFI modulemap/header:
          # uniffi-bindgen-react-native's generated C++ links the framework binary's
          # symbols directly. CocoaPods `vendored_frameworks` embeds & signs it.
          HELPER=nobodywho/scripts/make-apple-framework.sh
          bash "$HELPER" artifacts/nobodywho-uniffi-aarch64-apple-ios-release \
            libnobodywho-uniffi-aarch64-apple-ios-release.dylib NobodywhoFramework flat device
          bash "$HELPER" artifacts/nobodywho-uniffi-aarch64-apple-ios-sim-release \
            libnobodywho-uniffi-aarch64-apple-ios-sim-release.dylib NobodywhoFramework flat sim
          xcodebuild -create-xcframework \
            -framework device/NobodywhoFramework.framework \
            -framework sim/NobodywhoFramework.framework \
            -output NobodywhoFramework.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r NobodywhoFramework.xcframework.zip NobodywhoFramework.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-react-native-xcframework
          path: ./NobodywhoFramework.xcframework.zip

  # builds an xcframework containing static libraries + headers for Swift SPM
  build-swift-xcframework:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download uniffi Apple artifacts"
        uses: actions/download-artifact@v5
        with:
          # No merge-multiple: the embedded ggml dylibs have generic filenames
          # (libggml.0.dylib, ...) and would collide across slices if merged.
          # Each artifact stays in artifacts/<artifact-name>/.
          pattern: nobodywho-uniffi-*-apple-*-release
          path: artifacts

      - name: "Build dynamic-framework XCFramework"
        run: |
          # Dynamic frameworks (uniffi .dylib) with the ggml/llama dylibs embedded.
          # Verified on macOS + iOS simulator. The framework module is `nobodywhoFFI`
          # so the generated swift's `import nobodywhoFFI` resolves.
          HELPER=nobodywho/scripts/make-apple-framework.sh
          HDR=nobodywho/swift/generated/nobodywhoFFI.h
          mkslice() { # $1=target $2=layout $3=slice-out-dir
            bash "$HELPER" "artifacts/nobodywho-uniffi-$1-release" \
              "libnobodywho-uniffi-$1-release.dylib" nobodywhoFFI "$2" "$3" "$HDR" ooo.nobodywho.ffi
          }
          mkslice aarch64-apple-ios          flat      ios-device
          mkslice aarch64-apple-ios-sim      flat      ios-sim
          mkslice aarch64-apple-darwin       versioned macos
          mkslice aarch64-apple-visionos     flat      visionos-device
          mkslice aarch64-apple-visionos-sim flat      visionos-sim
          mkslice aarch64-apple-watchos      flat      watchos-device
          mkslice aarch64-apple-watchos-sim  flat      watchos-sim

          xcodebuild -create-xcframework \
            -framework ios-device/nobodywhoFFI.framework \
            -framework ios-sim/nobodywhoFFI.framework \
            -framework macos/nobodywhoFFI.framework \
            -framework visionos-device/nobodywhoFFI.framework \
            -framework visionos-sim/nobodywhoFFI.framework \
            -framework watchos-device/nobodywhoFFI.framework \
            -framework watchos-sim/nobodywhoFFI.framework \
            -output NobodyWhoNative.xcframework

      - name: "Zip XCFramework"
        run: zip -y -r NobodyWhoNative.xcframework.zip NobodyWhoNative.xcframework

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-swift-xcframework
          path: ./NobodyWhoNative.xcframework.zip

  # Runtime smoke test: prove the dynamically-linked ggml/llama graph resolves on
  # an actual iOS simulator (guards the "opaque to Apple consumers" promise —
  # install_name/rpath/embedding mistakes surface here instead of on a user device).
  apple-runtime-smoke:
    if: inputs.full_ci
    runs-on: warp-macos-15-arm64-6x
    needs: [cargo-build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: "Download iOS simulator uniffi artifact"
        uses: actions/download-artifact@v5
        with:
          # Use `name:` (not `pattern:`) so the single artifact's contents extract
          # directly into `path` — a single-match `pattern` extracts to the path root
          # WITHOUT a per-artifact subdir, which would leave artifacts/<name>/ empty.
          # Point `path` straight at the SRC dir the smoke step reads.
          name: nobodywho-uniffi-aarch64-apple-ios-sim-release
          path: artifacts/nobodywho-uniffi-aarch64-apple-ios-sim-release

      - name: "Assemble framework and dlopen it on a booted simulator"
        run: |
          set -euo pipefail
          SRC=artifacts/nobodywho-uniffi-aarch64-apple-ios-sim-release
          bash nobodywho/scripts/make-apple-framework.sh \
            "$SRC" libnobodywho-uniffi-aarch64-apple-ios-sim-release.dylib \
            nobodywhoFFI flat ./smoke nobodywho/swift/generated/nobodywhoFFI.h ooo.nobodywho.ffi

          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          xcrun -sdk iphonesimulator clang -target arm64-apple-ios15.0-simulator \
            -isysroot "$SDK" nobodywho/scripts/apple-dlopen-smoke.c -o smoke/dlopen-smoke

          # Boot the first available iOS simulator
          UDID=$(xcrun simctl list devices available | grep -m1 -oE '[0-9A-F-]{36}') || true
          if [ -z "$UDID" ]; then
            RT=$(xcrun simctl list runtimes | grep -m1 -oE 'com.apple.CoreSimulator.SimRuntime.iOS[^ ]*')
            UDID=$(xcrun simctl create smoke-iphone com.apple.CoreSimulator.SimDeviceType.iPhone-15 "$RT")
          fi
          xcrun simctl boot "$UDID" || true

          out=$(xcrun simctl spawn "$UDID" "$PWD/smoke/dlopen-smoke" "$PWD/smoke/nobodywhoFFI.framework/nobodywhoFFI")
          echo "$out"
          echo "$out" | grep -q "DLOPEN OK"

  cargo-build-android:
    if: inputs.full_ci
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      fail-fast: false
      matrix:
        target:
          - "aarch64-linux-android"
          - "x86_64-linux-android"
        profile:
          - "debug"
          - "release"
        integration:
          - "godot"
          - "flutter"
          - "uniffi"
        exclude:
          # debug builds are only consumed by the godot .gdextension; other integrations ship release-only
          - integration: "flutter"
            profile: "debug"
          - integration: "uniffi"
            profile: "debug"
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}-
      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: "Install distro dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc gcc-multilib
          # patchelf: normalize the Android ggml/llama SONAMEs to unversioned names
          # (Android APKs cannot ship versioned .so.N and the loader needs unversioned)
          sudo apt-get install -y patchelf

      - name: "Install Android NDK"
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          add-to-path: false

      - name: Setup Flutter SDK
        if: matrix.integration == 'flutter'
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      # ort-sys has no prebuilt for x86_64-linux-android (pyke only ships arm64).
      # Pull Microsoft's official Android AAR (which has x86_64) and point ort-sys at it.
      # Version must match ort-sys's pyke distribution (ms@1.24.2 — see ort-sys/build/download/dist.txt).
      - name: "Fetch ONNX Runtime for x86_64-linux-android"
        if: matrix.target == 'x86_64-linux-android'
        id: ort-android
        run: |
          ORT_VERSION=1.24.2
          ORT_DIR="$RUNNER_TEMP/ort-android-x86_64/lib"
          mkdir -p "$ORT_DIR"
          curl -L --fail -o /tmp/onnxruntime.aar \
            "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${ORT_VERSION}/onnxruntime-android-${ORT_VERSION}.aar"
          unzip -j -o /tmp/onnxruntime.aar 'jni/x86_64/libonnxruntime.so' -d "$ORT_DIR"
          echo "ort_dir=$ORT_DIR" >> "$GITHUB_OUTPUT"

      - name: "Compile for android"
        # ORT_LIB_PATH/ORT_PREFER_DYNAMIC_LINK only set when ort-android step ran (x86_64);
        # exporting them empty on arm64 would put ort-sys into manual-link mode with no path.
        run: |
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            export ORT_LIB_PATH="${{ steps.ort-android.outputs.ort_dir }}"
            export ORT_PREFER_DYNAMIC_LINK=1
          fi
          cargo build -p nobodywho-${{ matrix.integration }} --verbose --target ${{ matrix.target }} ${{ matrix.profile == 'release' && '--release' || '' }} --locked
        working-directory: ./nobodywho
        env:
          ANDROID_NDK: "${{ steps.setup-ndk.outputs.ndk-path }}"
          # aarch64 (arm64-v8a)
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang"
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CC_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang"
          CXX_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++"
          AR_aarch64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          # x86_64
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android34-clang"
          CARGO_TARGET_X86_64_LINUX_ANDROID_AR: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          CC_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android31-clang"
          CXX_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android31-clang++"
          AR_x86_64_linux_android: "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

        # XXX: .so files for android in godot MUST start with "lib"
      - name: "Rename built file"
        run: |
          if [ "${{ matrix.integration }}" = "uniffi" ]; then
            # uniffi produces both static (.a) for React Native/Swift and shared (.so) for Kotlin/JNA
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.a \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.a
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
          else
            cp ./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}/libnobodywho_${{ matrix.integration }}.so \
              ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.so
          fi
          # x86_64 Android links dynamically against libonnxruntime.so — ship it alongside.
          if [ "${{ matrix.target }}" = "x86_64-linux-android" ]; then
            cp "${{ steps.ort-android.outputs.ort_dir }}/libonnxruntime.so" ./libonnxruntime.so
          fi
          # dynamic-link: ship the ggml/llama .so alongside. The Android loader
          # resolves NEEDED libraries from the app's native lib dir (jniLibs/<abi>).
          # NOTE: Android APKs cannot package versioned .so.N filenames and the
          # loader needs unversioned SONAMEs (libggml.so, not libggml.so.0). If the
          # NDK build emits versioned SONAMEs this needs unversioning (patchelf
          # --set-soname + rename, or an SOVERSION "" cmake change in the fork).
          # Copy the real files (dereferenced) for now.
          find "./nobodywho/target/${{ matrix.target }}/${{ matrix.profile }}" \
            \( -name 'libggml*.so*' -o -name 'libllama*.so*' \) \
            -exec cp -L -n {} ./ \; 2>/dev/null || true
          # Android requires unversioned SONAMEs — normalize + repoint DT_NEEDED.
          bash nobodywho/scripts/unversion-elf-libs.sh ./

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}
          path: |
            ./libnobodywho-${{ matrix.integration }}-${{ matrix.target }}-${{ matrix.profile }}.*
            ./libonnxruntime.so
            ./libggml*.so*
            ./libllama*.so*
