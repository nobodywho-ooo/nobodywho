name: "JS CI"

on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full JS CI (wasm build + model tests). If false, only lint regression tests run."
        type: boolean
        default: false

permissions:
  contents: read

env:
  EMSDK_FORK_URL: https://github.com/walkingeyerobot/emscripten
  EMSDK_FORK_REF: wbg-walkingeyerobot
  WBG_FORK_URL: https://github.com/nobodywho-ooo/wasm-bindgen
  WBG_FORK_REF: wasm-emscripten-0.2.122

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-js-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-js-lint-

      # Same toolchain action as python_ci.yml and the build job below.
      # cache: false keeps the manual "Cache Cargo Home" step above as the
      # single caching mechanism (no double-cache of ~/.cargo + target).
      - name: "Setup Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: "Install Vulkan dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc

      - name: "Run lint regression tests"
        working-directory: ./nobodywho
        run: cargo test -p nobodywho-js --locked

  # Build once: produce the wasm32-unknown-emscripten pkg-bundler/ and upload it
  # as an artifact. The tests job downloads that artifact instead of rebuilding —
  # same "build once, fan out tests" topology python_ci.yml uses for its wheel.
  build:
    if: inputs.full_ci
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: "Cache cargo registry + git deps"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nobodywho/target
          key: js-${{ runner.os }}-emsc-${{ hashFiles('nobodywho/Cargo.lock') }}
          restore-keys: |
            js-${{ runner.os }}-emsc-

      - name: "Setup Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable,nightly
          target: wasm32-unknown-emscripten
          components: rust-src

      - name: "Install system deps"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake python3 python3-pip build-essential libclang-dev clang brotli \
            libvulkan-dev libshaderc-dev glslc

      - name: "Install upstream emsdk (provides LLVM + binaryen)"
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7
          actions-cache-folder: emsdk-cache-v1

      - name: "Cache patched Emscripten fork"
        id: emsdk-cache
        uses: actions/cache@v5
        with:
          path: ~/emscripten-wbg
          key: emsdk-wbg-${{ runner.os }}-v9

      - name: "Clone + bootstrap + configure patched Emscripten fork"
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$EMSDK_FORK_REF" "$EMSDK_FORK_URL" "$HOME/emscripten-wbg"
          cd "$HOME/emscripten-wbg"
          ./bootstrap
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > emscripten-version.txt

      - name: "Export EMSDK_DIR + EM_CONFIG"
        run: |
          echo "EMSDK_DIR=$HOME/emscripten-wbg" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$HOME/emscripten-wbg/.emscripten" >> "$GITHUB_ENV"
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > "$HOME/emscripten-wbg/emscripten-version.txt"

      - name: "Cache patched wasm-bindgen-cli"
        id: wbg-cache
        uses: actions/cache@v5
        with:
          path: /tmp/wbg-patched
          key: wbg-patched-${{ runner.os }}-${{ env.WBG_FORK_REF }}-v1

      - name: "Build patched wasm-bindgen-cli (if not cached)"
        if: steps.wbg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$WBG_FORK_REF" "$WBG_FORK_URL" /tmp/wbg-src
          cargo install --path /tmp/wbg-src/crates/cli --root /tmp/wbg-patched --locked

      - name: "Build pkg-bundler (wasm32-unknown-emscripten)"
        env:
          EM_WASM_BINDGEN: /tmp/wbg-patched/bin/wasm-bindgen
          LIBCLANG_PATH: /usr/lib/llvm-18/lib
        run: bash nobodywho/js/scripts/build-pkg-emscripten.sh

      - name: "Inspect artifact sizes"
        working-directory: nobodywho/js/pkg-bundler
        run: |
          ls -lh
          echo ""
          echo "Brotli-compressed wasm size:"
          brotli -k -q 11 nobodywho_js_bg.wasm -o /tmp/wasm.br || true
          ls -lh /tmp/wasm.br || true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho-js-pkg
          path: nobodywho/js/pkg-bundler/
          retention-days: 14

  # Fan out the model tests over the prebuilt artifact. Each leg only needs
  # Node + the downloaded pkg-bundler/ + its model(s) — no Rust/Emscripten/CMake
  # toolchain — so they run in parallel, mirroring python_ci.yml's per-suite jobs.
  tests:
    if: inputs.full_ci
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Model.load + Encoder.encode"
            model_file: bge-small.gguf
            model_url: https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf
            run: node js/tests/test_emscripten.mjs /tmp/models/bge-small.gguf
          - name: "onProgress download callback (URL streaming)"
            model_file: bge-small.gguf
            model_url: https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf
            run: node js/tests/test_onprogress.mjs /tmp/models/bge-small.gguf
          - name: "vision (Qwen3.5-0.8B multimodal)"
            model_file: qwen3.5-0.8b-q4km.gguf
            model_url: https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf
            mmproj_file: qwen3.5-0.8b-mmproj-f16.gguf
            mmproj_url: https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/mmproj-F16.gguf
            run: node js/tests/test_vision.mjs /tmp/models/qwen3.5-0.8b-q4km.gguf /tmp/models/qwen3.5-0.8b-mmproj-f16.gguf python/tests/img/penguin.png
    steps:
      - uses: actions/checkout@v5

      - name: "Set up Node 26"
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: "Download pkg-bundler artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-js-pkg
          path: nobodywho/js/pkg-bundler/

      # Cache the GGUFs across runs, keyed by filename(s) (-v1 = manual bust lever).
      # The two bge-small legs share a key, so it's fetched once and reused.
      - name: "Cache test model(s)"
        uses: actions/cache@v5
        with:
          path: /tmp/models
          key: gguf-v1-${{ matrix.model_file }}-${{ matrix.mmproj_file }}

      - name: "Download test model(s) (skips any restored from cache)"
        run: |
          mkdir -p /tmp/models
          [ -f "/tmp/models/${{ matrix.model_file }}" ] || curl -L --fail -o "/tmp/models/${{ matrix.model_file }}" '${{ matrix.model_url }}'
          if [ -n "${{ matrix.mmproj_url }}" ]; then
            [ -f "/tmp/models/${{ matrix.mmproj_file }}" ] || curl -L --fail -o "/tmp/models/${{ matrix.mmproj_file }}" '${{ matrix.mmproj_url }}'
          fi
          ls -lh /tmp/models/*.gguf

      - name: "Test: ${{ matrix.name }}"
        working-directory: nobodywho
        run: ${{ matrix.run }}
