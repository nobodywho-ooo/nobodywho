name: "JS CI"

on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full JS CI (wasm build + model smoke tests). If false, only lint regression tests run."
        type: boolean
        default: false

permissions:
  contents: read

env:
  EMSDK_FORK_URL: https://github.com/walkingeyerobot/emscripten
  EMSDK_FORK_REF: wbg-walkingeyerobot
  WBG_FORK_URL: https://github.com/nobodywho-ooo/wasm-bindgen
  WBG_FORK_REF: emscripten-descriptor-fixes

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: "Cache Cargo Home"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-js-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-js-lint-

      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Install Vulkan dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc

      - name: "Run lint regression tests"
        working-directory: ./nobodywho
        run: cargo test -p nobodywho-js --locked

  build-and-test:
    if: inputs.full_ci
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: "Cache cargo registry + git deps"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nobodywho/target
          key: js-${{ runner.os }}-emsc-${{ hashFiles('nobodywho/Cargo.lock') }}
          restore-keys: |
            js-${{ runner.os }}-emsc-

      - name: "Setup Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable,nightly
          target: wasm32-unknown-emscripten
          components: rust-src

      - name: "Install system deps"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake python3 python3-pip build-essential libclang-dev clang brotli \
            libvulkan-dev libshaderc-dev glslc

      - name: "Install upstream emsdk (provides LLVM + binaryen)"
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7
          actions-cache-folder: emsdk-cache-v1

      - name: "Cache patched Emscripten fork"
        id: emsdk-cache
        uses: actions/cache@v5
        with:
          path: ~/emscripten-wbg
          key: emsdk-wbg-${{ runner.os }}-v9

      - name: "Clone + bootstrap + configure patched Emscripten fork"
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$EMSDK_FORK_REF" "$EMSDK_FORK_URL" "$HOME/emscripten-wbg"
          cd "$HOME/emscripten-wbg"
          ./bootstrap
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > emscripten-version.txt

      - name: "Export EMSDK_DIR + EM_CONFIG"
        run: |
          echo "EMSDK_DIR=$HOME/emscripten-wbg" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$HOME/emscripten-wbg/.emscripten" >> "$GITHUB_ENV"
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > "$HOME/emscripten-wbg/emscripten-version.txt"

      - name: "Cache patched wasm-bindgen-cli"
        id: wbg-cache
        uses: actions/cache@v5
        with:
          path: /tmp/wbg-patched
          key: wbg-patched-${{ runner.os }}-${{ env.WBG_FORK_REF }}-v1

      - name: "Build patched wasm-bindgen-cli (if not cached)"
        if: steps.wbg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$WBG_FORK_REF" "$WBG_FORK_URL" /tmp/wbg-src
          cargo install --path /tmp/wbg-src/crates/cli --root /tmp/wbg-patched --locked

      - name: "Set up Node 26"
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: "Build pkg-bundler (wasm32-unknown-emscripten)"
        env:
          EM_WASM_BINDGEN: /tmp/wbg-patched/bin/wasm-bindgen
          LIBCLANG_PATH: /usr/lib/llvm-18/lib
        run: bash nobodywho/js/scripts/build-pkg-emscripten.sh

      - name: "Download test models"
        working-directory: /tmp
        run: |
          curl -L --fail -o bge-small.gguf \
            'https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf'
          curl -L --fail -o qwen3.5-0.8b-q4km.gguf \
            'https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf'
          curl -L --fail -o qwen3.5-0.8b-mmproj-f16.gguf \
            'https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/mmproj-F16.gguf'
          ls -lh *.gguf

      - name: "Smoke: Model.load + Encoder.encode"
        working-directory: nobodywho
        run: node js/tests/emscripten-smoke.mjs /tmp/bge-small.gguf

      - name: "Smoke: vision (Qwen3.5-0.8B multimodal)"
        working-directory: nobodywho
        run: |
          node js/tests/vision-smoke.mjs \
            /tmp/qwen3.5-0.8b-q4km.gguf \
            /tmp/qwen3.5-0.8b-mmproj-f16.gguf \
            python/tests/img/penguin.png

      - name: "Inspect artifact sizes"
        working-directory: nobodywho/js/pkg-bundler
        run: |
          ls -lh
          echo ""
          echo "Brotli-compressed wasm size:"
          brotli -k -q 11 nobodywho_js_bg.wasm -o /tmp/wasm.br || true
          ls -lh /tmp/wasm.br || true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-js-pkg
          path: nobodywho/js/pkg-bundler/
          retention-days: 14
