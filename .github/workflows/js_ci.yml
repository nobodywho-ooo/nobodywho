name: "JS CI"

# Builds the wasm32-unknown-emscripten target via the patched Emscripten
# fork + patched wasm-bindgen-cli, then runs the no-model lint suite
# plus an end-to-end Encoder smoke against a tiny 35 MB embedding GGUF.
# Mirrors what `js/scripts/build-pkg-emscripten.sh` does locally.
#
# The two patched forks (Emscripten + wasm-bindgen) are slow to build
# from source but are cached across runs — first run is ~12 min, cached
# subsequent runs ~4 min.

on:
  workflow_call: {}

env:
  # walkingeyerobot's emscripten fork carries the -sWASM_BINDGEN flag
  # (tracked in emscripten-core/emscripten#23493). The patch lives on
  # the `wbg-walkingeyerobot` branch, not main.
  EMSDK_FORK_URL: https://github.com/walkingeyerobot/emscripten
  EMSDK_FORK_REF: wbg-walkingeyerobot
  WBG_FORK_URL: https://github.com/nobodywho-ooo/wasm-bindgen
  WBG_FORK_REF: emscripten-descriptor-fixes

jobs:
  js-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo registry + git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nobodywho/target
          key: js-${{ runner.os }}-emsc-${{ hashFiles('nobodywho/Cargo.lock') }}
          restore-keys: |
            js-${{ runner.os }}-emsc-

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-emscripten

      - name: Install system deps for emscripten + bindgen
        # libclang for bindgen (consumed via $LIBCLANG_PATH below);
        # cmake + python3 are needed by Emscripten + llama.cpp's cmake;
        # build-essential gets us a C compiler for emscripten's bootstrap.
        # libvulkan-dev + libshaderc-dev + glslc: the native lint step
        # (`cargo test -p nobodywho-js`) transitively builds
        # llama-cpp-sys-2 for the host target with the `vulkan` ggml
        # backend enabled, which requires Vulkan headers + the glslc
        # shader compiler. Mirrors the apt set used by the other linux
        # binding workflows.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake python3 python3-pip build-essential libclang-dev clang brotli \
            libvulkan-dev libshaderc-dev glslc

      - name: Run lint regression tests (native target, no wasm toolchain needed)
        # Source-text invariants over the binding + examples + scripts.
        # Failing here means a docstring / example / build script drifted
        # from a contract a past code review pinned. See js/tests/lint.rs.
        working-directory: nobodywho
        run: cargo test -p nobodywho-js

      - name: Install upstream emsdk (provides LLVM + binaryen)
        # walkingeyerobot's fork is just patched Python wrappers — it
        # doesn't bundle LLVM. Install emsdk separately for the LLVM /
        # binaryen / node bundle, then point the fork's .emscripten at
        # them. Mirrors the local setup (homebrew emscripten as the
        # LLVM source paired with the fork's wrappers).
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7
          actions-cache-folder: emsdk-cache-v1

      - name: Cache patched Emscripten fork
        id: emsdk-cache
        uses: actions/cache@v4
        with:
          path: ~/emscripten-wbg
          # Bump the v# suffix when the fork URL or bootstrap behavior
          # changes in a way the cached tree would miss. v6->v7 forced
          # because the v6 cache was built by `embuilder build sysroot`
          # which silently missed files on Linux (CI). v7 is populated
          # manually via cp -r of the full source include trees, with a
          # written stamp file so emcc doesn't re-run install.
          key: emsdk-wbg-${{ runner.os }}-v7

      - name: Clone + bootstrap + configure patched Emscripten fork
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        # Clone walkingeyerobot's patched wrappers, then:
        # 1. Run ./bootstrap to generate the emcc / em++ / etc. entry-
        #    point shell wrappers from emcc.py / em++.py etc.
        #    (bootstrap calls tools/maint/create_entry_points.py).
        #    Without this, only the .py files exist — emcc as a
        #    callable command doesn't.
        # 2. Write `.emscripten` pointing at emsdk's LLVM / binaryen /
        #    node bundle. The local setup uses homebrew emscripten as
        #    the LLVM provider; in CI we reuse emsdk's.
        # 3. Pre-populate cache/sysroot with `embuilder build sysroot`,
        #    then run a single-threaded C++ primer compile that pulls in
        #    every libc++ header llama.cpp transitively needs. The
        #    primer forces emcc to invoke its sanity-check + cache
        #    population path once, in series — so when cmake later spawns
        #    4 parallel emcc workers, they all hit a fully-populated
        #    cache rather than racing to populate it.
        #    A previous attempt at `cp -r system/lib/libcxx/include`
        #    proved insufficient: emcc's first-compile-time sanity check
        #    seems to overwrite the cache with a curated subset.
        run: |
          git clone --depth 1 --branch "$EMSDK_FORK_REF" "$EMSDK_FORK_URL" "$HOME/emscripten-wbg"
          cd "$HOME/emscripten-wbg"
          ./bootstrap
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          ls -la "$HOME/emscripten-wbg/emcc" "$HOME/emscripten-wbg/.emscripten"
          # Manually populate cache/sysroot — emcc's own
          # install_system_headers silently misses files on CI's Linux
          # Python (locally on macOS it's complete; on Ubuntu runners
          # files like __functional/hash.h and math.h end up absent).
          # Replicate the install_dirs mapping from system_libs.py by
          # hand, then write the stamp so emcc skips its own install
          # and doesn't clobber the overlay.
          mkdir -p cache/sysroot/include/bits cache/sysroot/include/c++/v1
          cp -r system/include/.                          cache/sysroot/include/
          cp -r system/lib/compiler-rt/include/.          cache/sysroot/include/
          cp -r system/lib/libunwind/include/.            cache/sysroot/include/
          cp -r system/lib/libc/musl/arch/generic/bits/.  cache/sysroot/include/bits/
          cp -r system/lib/libc/musl/arch/emscripten/bits/. cache/sysroot/include/bits/
          cp -r system/lib/libc/musl/include/.            cache/sysroot/include/
          cp -r system/lib/libcxx/include/.               cache/sysroot/include/c++/v1/
          cp -r system/lib/libcxxabi/include/.            cache/sysroot/include/c++/v1/
          cp -r system/lib/mimalloc/include/.             cache/sysroot/include/
          mkdir -p cache
          echo 'x' > cache/sysroot_install.stamp
          # Spot-check that the explicitly-named victims from prior runs
          # are present so we fail loud at bootstrap if the cp set drifts.
          missing=0
          for h in \
              c++/v1/__atomic/aliases.h \
              c++/v1/__utility/private_constructor_tag.h \
              c++/v1/__locale_dir/messages.h \
              c++/v1/__functional/hash.h \
              c++/v1/cassert \
              c++/v1/cstdint \
              stdio.h \
              errno.h \
              math.h \
              stdint.h; do
            if [ ! -f "cache/sysroot/include/$h" ]; then
              echo "::error::missing cache/sysroot/include/$h"
              missing=1
            fi
          done
          [ "$missing" = 0 ]

      - name: Export EMSDK_DIR + EM_CONFIG to job env
        # Runs whether or not the cache hit. The build script reads both
        # of these (EMSDK_DIR has emcc on $PATH; EM_CONFIG tells emcc
        # where to find LLVM/binaryen/node).
        run: |
          echo "EMSDK_DIR=$HOME/emscripten-wbg" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$HOME/emscripten-wbg/.emscripten" >> "$GITHUB_ENV"

      - name: Cache patched wasm-bindgen-cli
        id: wbg-cache
        uses: actions/cache@v4
        with:
          path: /tmp/wbg-patched
          key: wbg-patched-${{ runner.os }}-${{ env.WBG_FORK_REF }}-v1

      - name: Build patched wasm-bindgen-cli (if not cached)
        if: steps.wbg-cache.outputs.cache-hit != 'true'
        # Patched fork adds descriptor-interpreter tolerance for the
        # Emscripten output mode that emcc-wbg's post-link step uses.
        # Stock CLI silently emits bundler-shape output instead and the
        # post-link step then can't find library_bindgen.js.
        run: |
          git clone --depth 1 --branch "$WBG_FORK_REF" "$WBG_FORK_URL" /tmp/wbg-src
          cargo install --path /tmp/wbg-src/crates/cli --root /tmp/wbg-patched --locked

      - name: Set up Node 26
        # Node 26+: wasi-sdk/libcxx STL emits noexternref (WasmGC) +
        # exn (wasm EH) types that older Nodes flag as experimental.
        # Node 26 enables both by default.
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Verify sysroot cache is intact (debug)
        # Re-run the assertion just before pkg-bundler so we can tell if
        # the cache survives all intermediate steps or is being clobbered.
        # Also dump some stats about what's actually in there.
        run: |
          echo "== file counts =="
          echo "c++/v1 entries: $(ls $HOME/emscripten-wbg/cache/sysroot/include/c++/v1/ | wc -l)"
          echo "include top entries: $(ls $HOME/emscripten-wbg/cache/sysroot/include/ | wc -l)"
          echo "stamp present: $([ -f $HOME/emscripten-wbg/cache/sysroot_install.stamp ] && echo YES || echo NO)"
          echo "== first 50 c++/v1 entries =="
          ls $HOME/emscripten-wbg/cache/sysroot/include/c++/v1/ | head -50
          echo "== explicit file checks =="
          for h in c++/v1/functional c++/v1/__functional/hash.h \
                   c++/v1/map c++/v1/algorithm c++/v1/utility \
                   stdio.h math.h errno.h stdint.h; do
            if [ ! -f "$HOME/emscripten-wbg/cache/sysroot/include/$h" ]; then
              echo "::error::missing $h"
              exit 1
            fi
          done
          echo "All present."

      - name: Build pkg-bundler (wasm32-unknown-emscripten)
        env:
          # Override EMSDK so llama-cpp-sys-2's detect_emscripten_root()
          # finds the fork's cmake/Modules/Platform/Emscripten.cmake
          # instead of the upstream emsdk's. Without this, cmake uses
          # upstream emcc (5.0.7) which detects a sanity-version
          # mismatch with the fork (5.0.8-git), calls cache.erase(),
          # then lazily re-populates the upstream cache under parallel
          # cmake — the race that causes missing libc++ headers.
          EMSDK: ${{ env.EMSDK_DIR }}
          EM_WASM_BINDGEN: /tmp/wbg-patched/bin/wasm-bindgen
          # llvm-config-* on ubuntu-24.04 points at /usr/lib/llvm-*/lib
          LIBCLANG_PATH: /usr/lib/llvm-18/lib
        # Builds llama.cpp + the Rust binding for wasm32-unknown-emscripten,
        # injects the wasm-bindgen marker custom section, runs the patched
        # wasm-bindgen-cli, applies the codegen sed patches, runs em++
        # in --post-link mode to emit the modularized loader.
        run: bash nobodywho/js/scripts/build-pkg-emscripten.sh

      - name: Download tiny embedding GGUF
        working-directory: /tmp
        run: |
          # bge-small-en-v1.5 Q8_0 is 35 MB — enough to exercise
          # Model.loadBytes + Encoder.encode without burning CI time.
          curl -L --fail -o bge-small.gguf \
            'https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf'
          ls -lh bge-small.gguf

      - name: End-to-end embedding smoke
        # Sanity check that the binding can actually load a model and
        # produce embeddings. Parses the demo's output to confirm finite
        # floats came out, not zeros / NaNs.
        working-directory: nobodywho
        run: |
          output=$(node js/examples/encoder_demo.mjs /tmp/bge-small.gguf)
          echo "$output"
          echo "$output" | grep -q "Embedding dimension: 384" \
            || { echo "expected 'Embedding dimension: 384' line in output"; exit 1; }
          echo "$output" | grep -q "first 8: \[-\?[0-9]" \
            || { echo "expected 'first 8: [<float>...' line"; exit 1; }

      - name: emscripten-smoke (Model.loadBytes + Encoder.encode)
        working-directory: nobodywho
        run: node js/scripts/emscripten-smoke.mjs /tmp/bge-small.gguf

      - name: Inspect artifact sizes
        working-directory: nobodywho/js/pkg-bundler
        run: |
          ls -lh
          echo ""
          echo "Brotli-compressed size of wasm (target for npm distribution):"
          brotli -k -q 11 nobodywho_js_bg.wasm -o /tmp/wasm.br || true
          ls -lh /tmp/wasm.br || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-js-pkg
          path: nobodywho/js/pkg-bundler/
          retention-days: 14
