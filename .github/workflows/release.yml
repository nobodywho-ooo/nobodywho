name: "Release"
on:
  workflow_call:

jobs:
  godot-distributable:
    runs-on: ubuntu-24.04
    steps:
        - uses: actions/checkout@v4
  
        - name: "Download all build artifacts"
          uses: actions/download-artifact@v4
          with:
            path: ./artifacts
  
        - name: "Make directory structure for release zip"
          run: |
            mkdir -p nobodywho-release/bin/addons/nobodywho
            # copy in nobodywho libs
            cp ./artifacts/*/*nobodywho-godot* ./nobodywho-release/bin/addons/nobodywho/
            # copy in gdextension metadata
            cp ./nobodywho/godot/nobodywho.gdextension ./nobodywho-release/bin/addons/nobodywho/
            cp ./assets/icon.svg ./nobodywho-release/bin/addons/nobodywho/
        - name: "Upload zipped godot build artifacts"
          uses: actions/upload-artifact@v4
          with:
            name: nobodywho-godot-all-platforms
            path: ./nobodywho-release

  unity-distributable:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Unity Package
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ./nobodywho/unity/src
          targetPlatform: StandaloneLinux64 # This is just for package creation
          customParameters: -executeMethod PackageBuilder.CreatePackage
          buildMethod: PackageBuilder.CreatePackage
          versioning: Semantic
          buildName: nobodywho-unity-package

      - name: Copy platform-specific plugins
        run: |
          mkdir -p ./nobodywho-release/Packages/com.nobodywho.core/Runtime/Plugins
          cp ./artifacts/*/*nobodywho* ./nobodywho-release/Packages/com.nobodywho.core/Runtime/Plugins/
          cp ./assets/icon.svg ./nobodywho-release/Packages/com.nobodywho.core/

      - name: Upload Unity Package
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-unity-package
          path: ./nobodywho-release 

  create-github-release:
    needs: [godot-distributable, unity-distributable]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-godot-all-platforms
          path: ./nobodywho-release

      - name: "Make zip file"
        working-directory: ./nobodywho-release
        run: zip -r "../nobodywho-godot-${{ github.ref_name }}.zip" ./**

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: "./nobodywho-godot-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
