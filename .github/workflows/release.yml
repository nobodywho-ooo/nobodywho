name: "Release"
on:
  workflow_call:
    secrets:
      TEST_PYPI_AUTH_TOKEN:
        required: true
      PYPI_AUTH_TOKEN:
        required: true
      NPM_TOKEN:
        required: true
      SWIFT_MIRROR_TOKEN:
        required: true
      MAVEN_CENTRAL_USERNAME:
        required: false
      MAVEN_CENTRAL_PASSWORD:
        required: false
      MAVEN_SIGNING_KEY:
        required: false
      MAVEN_SIGNING_PASSWORD:
        required: false

jobs:
  godot-distributable:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
        - uses: actions/checkout@v5
  
        - name: "Download all build artifacts"
          uses: actions/download-artifact@v5
          with:
            path: ./artifacts
  
        - name: "Make directory structure for release zip"
          run: |
            mkdir -p nobodywho-release/bin/addons/nobodywho
            # copy in nobodywho libs
            cp ./artifacts/*/*nobodywho-godot* ./nobodywho-release/bin/addons/nobodywho/
            # copy in gdextension metadata
            cp ./nobodywho/godot/nobodywho.gdextension ./nobodywho-release/bin/addons/nobodywho/
            cp ./assets/icon.svg ./nobodywho-release/bin/addons/nobodywho/
        - name: "Upload zipped godot build artifacts"
          uses: actions/upload-artifact@v5
          with:
            name: nobodywho-godot-all-platforms
            path: ./nobodywho-release

  create-github-release-godot:
    needs: [godot-distributable]
    if: startsWith(github.ref, 'refs/tags/nobodywho-godot-')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: "Download build artifacts"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-godot-all-platforms
          path: ./nobodywho-release-godot

      - name: "Make zip file"
        working-directory: ./nobodywho-release-godot
        run: zip -r "../nobodywho-godot-${{ github.ref_name }}.zip" ./**

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: "./nobodywho-godot-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-publish-wheels:
      runs-on: warp-ubuntu-latest-x64-2x
      if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
      steps:
        - name: Download all wheels
          uses: actions/download-artifact@v5
          with:
            pattern: nobodywho_python_*
            merge-multiple: true
            path: dist/

        - name: List wheels to upload
          run: ls -la dist/
        - uses: actions/setup-python@v6
          with:
            python-version: "3.13"
        
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install twine

        - name: Publish to TestPyPI
          run: python -m twine upload --repository testpypi dist/*
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.TEST_PYPI_AUTH_TOKEN }}

        - name: Download and pip install
          run: |
            python3 -m venv maturinvenv
            source ./maturinvenv/bin/activate
            python3 -m pip install --index-url https://test.pypi.org/simple/ nobodywho


  publish-wheels:
    needs:
      [
        test-publish-wheels
      ]
    runs-on: warp-ubuntu-latest-x64-2x
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: dist/

      - name: List wheels to upload
        run: ls -la dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_AUTH_TOKEN }}

  create-github-release-python:
    needs: [publish-wheels]
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: "Download all Python wheels"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: ./nobodywho-python-release

      - name: "List wheels to include in release"
        run: ls -la ./nobodywho-python-release/

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-python-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release-flutter:
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: write # Required to create github release
    steps:
      - uses: actions/checkout@v5

      - name: "Download all Flutter artifacts"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho-flutter-*
          merge-multiple: true
          path: ./nobodywho-flutter-release

      - name: "List artifacts to include in release"
        run: ls -la ./nobodywho-flutter-release/

      - name: "Verify XCFramework zip is present"
        working-directory: ./nobodywho-flutter-release
        run: |
          if [ ! -f "nobodywho_flutter.xcframework.zip" ]; then
            echo "ERROR: nobodywho_flutter.xcframework.zip not found!"
            echo "Contents of release directory:"
            ls -la .
            exit 1
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-flutter-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-flutter-to-pubdev:
    needs: [create-github-release-flutter]
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: nobodywho/flutter/nobodywho

  # Create GitHub Release with native binaries, then publish to npm.
  create-github-release-react-native:
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-v')
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: write
    steps:
      - name: "Download Android ARM64 artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-uniffi-aarch64-linux-android-release
          path: ./nobodywho-react-native-release

      - name: "Download Android x86_64 artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-uniffi-x86_64-linux-android-release
          path: ./nobodywho-react-native-release

      - name: "Download iOS XCFramework"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-react-native-xcframework
          path: ./nobodywho-react-native-release

      - name: "Keep only React Native artifacts (.so and xcframework)"
        run: |
          cd nobodywho-react-native-release
          rm -f *.a *.dll *.dylib *.pdb
          ls -la

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-react-native-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-react-native-npm:
    needs: [create-github-release-react-native]
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-v')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - uses: actions/checkout@v5

      - name: "Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: "Verify Login"
        working-directory: ./nobodywho/react-native
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish to npm"
        working-directory: ./nobodywho/react-native
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Mirror of publish-react-native-npm but for the js binding.
  # Tag your release like `nobodywho-js-v0.1.0` to trigger.
  # Builds the wasm32-unknown-emscripten artifact the same way js_ci.yml does
  # (upstream emsdk for LLVM/binaryen + our pinned Emscripten fork for
  # -sWASM_BINDGEN + our patched wasm-bindgen-cli, via build-pkg-emscripten.sh),
  # tests it, then publishes pkg-bundler/ to npm. Keep the setup steps in
  # sync with js_ci.yml's build job.
  publish-js-npm:
    if: startsWith(github.ref, 'refs/tags/nobodywho-js-v')
    runs-on: ubuntu-24.04
    env:
      EMSDK_FORK_URL: https://github.com/nobodywho-ooo/emscripten
      EMSDK_FORK_REF: wbg-walkingeyerobot
      WBG_FORK_URL: https://github.com/nobodywho-ooo/wasm-bindgen
      WBG_FORK_REF: wasm-emscripten-0.2.122
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: "Cache cargo registry + git deps"
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nobodywho/target
          key: js-${{ runner.os }}-emsc-${{ hashFiles('nobodywho/Cargo.lock') }}
          restore-keys: |
            js-${{ runner.os }}-emsc-

      - name: "Setup Rust toolchain"
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable,nightly
          target: wasm32-unknown-emscripten
          components: rust-src

      - name: "Install system deps"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake python3 python3-pip build-essential libclang-dev clang brotli \
            libvulkan-dev libshaderc-dev glslc

      - name: "Install upstream emsdk (provides LLVM + binaryen)"
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.7
          actions-cache-folder: emsdk-cache-v1

      - name: "Cache patched Emscripten fork"
        id: emsdk-cache
        uses: actions/cache@v5
        with:
          path: ~/emscripten-wbg
          key: emsdk-wbg-${{ runner.os }}-v9

      - name: "Clone + bootstrap + configure patched Emscripten fork"
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$EMSDK_FORK_REF" "$EMSDK_FORK_URL" "$HOME/emscripten-wbg"
          cd "$HOME/emscripten-wbg"
          ./bootstrap
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > emscripten-version.txt

      - name: "Export EMSDK_DIR + EM_CONFIG"
        run: |
          echo "EMSDK_DIR=$HOME/emscripten-wbg" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$HOME/emscripten-wbg/.emscripten" >> "$GITHUB_ENV"
          cat > "$HOME/emscripten-wbg/.emscripten" <<EMSCRIPTEN_CONFIG
          LLVM_ROOT = '$EMSDK/upstream/bin'
          BINARYEN_ROOT = '$EMSDK/upstream'
          NODE_JS = '$EMSDK_NODE'
          COMPILER_ENGINE = NODE_JS
          JS_ENGINES = [NODE_JS]
          CACHE = '$HOME/emscripten-wbg/cache'
          EMSCRIPTEN_CONFIG
          UPSTREAM_VER=$("$EMSDK/upstream/emscripten/emcc" --version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "${UPSTREAM_VER:-5.0.7}" > "$HOME/emscripten-wbg/emscripten-version.txt"

      - name: "Cache patched wasm-bindgen-cli"
        id: wbg-cache
        uses: actions/cache@v5
        with:
          path: /tmp/wbg-patched
          key: wbg-patched-${{ runner.os }}-${{ env.WBG_FORK_REF }}-v1

      - name: "Build patched wasm-bindgen-cli (if not cached)"
        if: steps.wbg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$WBG_FORK_REF" "$WBG_FORK_URL" /tmp/wbg-src
          cargo install --path /tmp/wbg-src/crates/cli --root /tmp/wbg-patched --locked

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          registry-url: https://registry.npmjs.org

      - name: "Build pkg-bundler (wasm32-unknown-emscripten)"
        env:
          EM_WASM_BINDGEN: /tmp/wbg-patched/bin/wasm-bindgen
          LIBCLANG_PATH: /usr/lib/llvm-18/lib
        run: bash nobodywho/js/scripts/build-pkg-emscripten.sh

      - name: "Cache pre-publish gate model"
        uses: actions/cache@v5
        with:
          path: /tmp/bge-small.gguf
          key: gguf-v1-bge-small-en-v1.5-q8_0

      - name: "Test: Model.load + Encoder.encode (pre-publish gate)"
        working-directory: nobodywho
        run: |
          [ -f /tmp/bge-small.gguf ] || curl -L --fail -o /tmp/bge-small.gguf \
            'https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf'
          node js/tests/test_emscripten.mjs /tmp/bge-small.gguf

      - name: "Stage package.json (release version) + README into pkg-bundler/"
        working-directory: nobodywho/js
        run: |
          VERSION="${GITHUB_REF_NAME#nobodywho-js-v}"
          echo "Publishing @nobodywho/js@${VERSION}"
          sed "s/0\.0\.0-PLACEHOLDER/${VERSION}/" package.json.tpl > pkg-bundler/package.json
          cp README.md pkg-bundler/README.md
          if grep -q "PLACEHOLDER" pkg-bundler/package.json; then
            echo "::error::version placeholder was not substituted"; exit 1
          fi
          node -e "console.log('pkg-bundler/package.json version =', require('./pkg-bundler/package.json').version)"

      - name: "Verify Login"
        working-directory: ./nobodywho/js/pkg-bundler
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish to npm"
        working-directory: ./nobodywho/js/pkg-bundler
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create GitHub Release with xcframework, then push to nobodywho-swift mirror repo.
  create-github-release-swift:
    if: startsWith(github.ref, 'refs/tags/nobodywho-swift-')
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: "Download Swift XCFramework"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-swift-xcframework
          path: ./release

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/NobodyWhoNative.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push to nobodywho-swift mirror repo"
        run: |
          TAG=$GITHUB_REF_NAME
          VERSION=${TAG#nobodywho-swift-v}
          CHECKSUM=$(shasum -a 256 release/NobodyWhoNative.xcframework.zip | cut -d' ' -f1)
          URL="https://github.com/nobodywho-ooo/nobodywho/releases/download/${TAG}/NobodyWhoNative.xcframework.zip"

          # Clone mirror repo
          git clone https://x-access-token:${{ secrets.SWIFT_MIRROR_TOKEN }}@github.com/nobodywho-ooo/nobodywho-swift.git mirror
          cd mirror

          # Clear and copy sources
          rm -rf src generated macros tests Package.swift README.md
          cp -r ../nobodywho/swift/src .
          mkdir -p generated
          cp ../nobodywho/swift/generated/nobodywho.swift generated/
          cp -r ../nobodywho/swift/macros .
          cp -r ../nobodywho/swift/tests .
          cp ../nobodywho/swift/Package.swift .
          cp ../nobodywho/swift/README.md .

          # Patch Package.swift: replace path: with url: + checksum:
          sed -i '' "s|path: \"Frameworks/NobodyWhoNative.xcframework\"|url: \"${URL}\",\n            checksum: \"${CHECKSUM}\"|" Package.swift

          # Commit, tag, push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin main --force
          git push origin "${VERSION}"

  # Build AAR + JAR with native libs, create GitHub Release, publish to Maven Central.
  create-github-release-kotlin:
    if: startsWith(github.ref, 'refs/tags/nobodywho-kotlin-v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: "Download all uniffi release artifacts"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho-uniffi-*-release
          merge-multiple: true
          path: ./artifacts

      - name: "List artifacts"
        run: ls -la artifacts/

      # Place Android native libs for AAR
      - name: "Setup Android jniLibs"
        run: |
          mkdir -p nobodywho/kotlin/android/build/jniLibs/{arm64-v8a,x86_64}
          cp artifacts/libnobodywho-uniffi-aarch64-linux-android-release.so \
            nobodywho/kotlin/android/build/jniLibs/arm64-v8a/libnobodywho_uniffi.so
          cp artifacts/libnobodywho-uniffi-x86_64-linux-android-release.so \
            nobodywho/kotlin/android/build/jniLibs/x86_64/libnobodywho_uniffi.so

      # Place desktop native libs for JVM JAR (JNA layout)
      - name: "Setup JVM native libs"
        run: |
          mkdir -p nobodywho/kotlin/jvm/src/main/resources/{linux-x86-64,linux-aarch64,darwin-aarch64,win32-x86-64}
          cp artifacts/libnobodywho-uniffi-x86_64-unknown-linux-gnu-release.so \
            nobodywho/kotlin/jvm/src/main/resources/linux-x86-64/libnobodywho_uniffi.so
          cp artifacts/libnobodywho-uniffi-aarch64-unknown-linux-gnu-release.so \
            nobodywho/kotlin/jvm/src/main/resources/linux-aarch64/libnobodywho_uniffi.so
          cp artifacts/libnobodywho-uniffi-aarch64-apple-darwin-release.dylib \
            nobodywho/kotlin/jvm/src/main/resources/darwin-aarch64/libnobodywho_uniffi.dylib
          cp artifacts/libnobodywho-uniffi-x86_64-pc-windows-msvc-release.dll \
            nobodywho/kotlin/jvm/src/main/resources/win32-x86-64/nobodywho_uniffi.dll

      - name: "Setup JDK"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: "Setup Android SDK"
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;34.0.0"

      # Set version from tag
      - name: "Set version"
        run: |
          VERSION=${GITHUB_REF_NAME#nobodywho-kotlin-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: "Build AAR and JAR"
        working-directory: ./nobodywho/kotlin
        run: |
          ./gradlew :android:assembleRelease :jvm:jar \
            -Pversion=${{ env.VERSION }}

      - name: "Collect release artifacts"
        run: |
          mkdir -p release
          cp nobodywho/kotlin/android/build/outputs/aar/android-release.aar \
            release/nobodywho-android-${{ env.VERSION }}.aar
          cp nobodywho/kotlin/jvm/build/libs/jvm-${{ env.VERSION }}.jar \
            release/nobodywho-${{ env.VERSION }}.jar

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Publish to Maven Central"
        working-directory: ./nobodywho/kotlin
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: ./gradlew publishAggregationToCentralPortal -Pversion=${{ env.VERSION }}
