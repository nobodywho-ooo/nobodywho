name: "Release"
on:
  workflow_call:
    secrets:
      TEST_PYPI_AUTH_TOKEN:
        required: true
      PYPI_AUTH_TOKEN:
        required: true
      NPM_TOKEN:
        required: true

jobs:
  godot-distributable:
    runs-on: ubuntu-24.04
    steps:
        - uses: actions/checkout@v4
  
        - name: "Download all build artifacts"
          uses: actions/download-artifact@v4
          with:
            path: ./artifacts
  
        - name: "Make directory structure for release zip"
          run: |
            mkdir -p nobodywho-release/bin/addons/nobodywho
            # copy in nobodywho libs
            cp ./artifacts/*/*nobodywho-godot* ./nobodywho-release/bin/addons/nobodywho/
            # copy in gdextension metadata
            cp ./nobodywho/godot/nobodywho.gdextension ./nobodywho-release/bin/addons/nobodywho/
            cp ./assets/icon.svg ./nobodywho-release/bin/addons/nobodywho/
        - name: "Upload zipped godot build artifacts"
          uses: actions/upload-artifact@v4
          with:
            name: nobodywho-godot-all-platforms
            path: ./nobodywho-release

  create-github-release-godot:
    needs: [godot-distributable]
    if: startsWith(github.ref, 'refs/tags/nobodywho-godot-')
    runs-on: ubuntu-24.04
    steps:
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-godot-all-platforms
          path: ./nobodywho-release-godot

      - name: "Make zip file"
        working-directory: ./nobodywho-release-godot
        run: zip -r "../nobodywho-godot-${{ github.ref_name }}.zip" ./**

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: "./nobodywho-godot-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-publish-wheels:
      runs-on: ubuntu-latest
      if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
      steps:
        - name: Download all wheels
          uses: actions/download-artifact@v4
          with:
            pattern: nobodywho_python_*
            merge-multiple: true
            path: dist/

        - name: List wheels to upload
          run: ls -la dist/
        - uses: actions/setup-python@v6
          with:
            python-version: "3.13"
        
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install twine

        - name: Publish to TestPyPI
          run: python -m twine upload --repository testpypi dist/*
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.TEST_PYPI_AUTH_TOKEN }}

        - name: Download and pip install
          run: |
            python3 -m venv maturinvenv
            source ./maturinvenv/bin/activate
            python3 -m pip install --index-url https://test.pypi.org/simple/ nobodywho


  publish-wheels:
    needs:
      [
        test-publish-wheels
      ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: dist/

      - name: List wheels to upload
        run: ls -la dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_AUTH_TOKEN }}

  create-github-release-python:
    needs: [publish-wheels]
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    runs-on: ubuntu-latest
    steps:
      - name: "Download all Python wheels"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: ./nobodywho-python-release

      - name: "List wheels to include in release"
        run: ls -la ./nobodywho-python-release/

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-python-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/nobodywho-napi-')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: "Download all napi artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-napi-*
          path: ./artifacts

      - name: "List downloaded artifacts"
        run: find ./artifacts -type f -name '*.node' | sort

      - name: "Install dependencies"
        working-directory: ./nobodywho/napi
        run: npm install

      - name: "Move native modules to platform packages"
        working-directory: ./nobodywho/napi
        run: npx napi artifacts --artifacts-dir ../../artifacts

      - name: "Build TypeScript wrapper"
        working-directory: ./nobodywho/napi
        run: npx tsc

      - name: "Publish platform packages"
        working-directory: ./nobodywho/napi
        run: npx napi prepublish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish main package"
        working-directory: ./nobodywho/napi
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release-napi:
    needs: [publish-npm]
    if: startsWith(github.ref, 'refs/tags/nobodywho-napi-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: "Download all napi artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-napi-*
          merge-multiple: true
          path: ./nobodywho-napi-release

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-napi-release/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release-flutter:
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required to create github release
    steps:
      - uses: actions/checkout@v4

      - name: "Download all Flutter artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-flutter-*
          merge-multiple: true
          path: ./nobodywho-flutter-release

      - name: "List artifacts to include in release"
        run: ls -la ./nobodywho-flutter-release/

      - name: "Verify XCFramework zip is present"
        working-directory: ./nobodywho-flutter-release
        run: |
          if [ ! -f "nobodywho_flutter.xcframework.zip" ]; then
            echo "ERROR: nobodywho_flutter.xcframework.zip not found!"
            echo "Contents of release directory:"
            ls -la .
            exit 1
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-flutter-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-flutter-to-pubdev:
    needs: [create-github-release-flutter]
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: nobodywho/flutter/nobodywho

  publish-react-native-npm:
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: "Download Android ARM64 artifact"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-uniffi-aarch64-linux-android-release
          path: ./android-artifacts

      - name: "Download Android x86_64 artifact"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-uniffi-x86_64-linux-android-release
          path: ./android-artifacts

      - name: "Download React Native XCFramework"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-react-native-xcframework
          path: ./ios-artifacts

      - name: "Place Android static libraries"
        run: |
          mkdir -p nobodywho/react-native/android/src/main/jniLibs/arm64-v8a
          mkdir -p nobodywho/react-native/android/src/main/jniLibs/x86_64
          cp ./android-artifacts/libnobodywho-uniffi-aarch64-linux-android-release.a \
            nobodywho/react-native/android/src/main/jniLibs/arm64-v8a/libnobodywho_uniffi.a
          cp ./android-artifacts/libnobodywho-uniffi-x86_64-linux-android-release.a \
            nobodywho/react-native/android/src/main/jniLibs/x86_64/libnobodywho_uniffi.a

      - name: "Place iOS XCFramework"
        run: |
          cd nobodywho/react-native
          unzip ../../ios-artifacts/NobodywhoReactNativeFramework.xcframework.zip

      - name: "Publish to npm"
        working-directory: ./nobodywho/react-native
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release-react-native:
    needs: [publish-react-native-npm]
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: "Download all uniffi release artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-uniffi-*-release
          merge-multiple: true
          path: ./nobodywho-react-native-release

      - name: "Download XCFramework"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-react-native-xcframework
          path: ./nobodywho-react-native-release

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-react-native-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
