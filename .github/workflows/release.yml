name: "Release"
on:
  workflow_call:
    secrets:
      TEST_PYPI_AUTH_TOKEN:
        required: true
      PYPI_AUTH_TOKEN:
        required: true

jobs:
  godot-distributable:
    runs-on: ubuntu-24.04
    steps:
        - uses: actions/checkout@v4
          with:
            submodules: true
  
        - name: "Download all build artifacts"
          uses: actions/download-artifact@v4
          with:
            path: ./artifacts
  
        - name: "Make directory structure for release zip"
          run: |
            mkdir -p nobodywho-release/bin/addons/nobodywho
            # copy in nobodywho libs
            cp ./artifacts/*/*nobodywho-godot* ./nobodywho-release/bin/addons/nobodywho/
            # copy in gdextension metadata
            cp ./nobodywho/godot/nobodywho.gdextension ./nobodywho-release/bin/addons/nobodywho/
            cp ./assets/icon.svg ./nobodywho-release/bin/addons/nobodywho/
        - name: "Upload zipped godot build artifacts"
          uses: actions/upload-artifact@v4
          with:
            name: nobodywho-godot-all-platforms
            path: ./nobodywho-release

  create-github-release-godot:
    needs: [godot-distributable]
    if: startsWith(github.ref, 'refs/tags/nobodywho-godot-')
    runs-on: ubuntu-24.04
    steps:
      - name: "Download build artifacts"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-godot-all-platforms
          path: ./nobodywho-release-godot

      - name: "Make zip file"
        working-directory: ./nobodywho-release-godot
        run: zip -r "../nobodywho-godot-${{ github.ref_name }}.zip" ./**

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: "./nobodywho-godot-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-publish-wheels:
      runs-on: ubuntu-latest
      if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
      steps:
        - name: Download all wheels
          uses: actions/download-artifact@v4
          with:
            pattern: nobodywho_python_*
            merge-multiple: true
            path: dist/

        - name: List wheels to upload
          run: ls -la dist/
        - uses: actions/setup-python@v6
          with:
            python-version: "3.13"
        
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install twine

        - name: Publish to TestPyPI
          run: python -m twine upload --repository testpypi dist/*
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.TEST_PYPI_AUTH_TOKEN }}

        - name: Download and pip install
          run: |
            python3 -m venv maturinvenv
            source ./maturinvenv/bin/activate
            python3 -m pip install --index-url https://test.pypi.org/simple/ nobodywho


  publish-wheels:
    needs:
      [
        test-publish-wheels
      ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: dist/

      - name: List wheels to upload
        run: ls -la dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_AUTH_TOKEN }}

  create-github-release-python:
    needs: [publish-wheels]
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    runs-on: ubuntu-latest
    steps:
      - name: "Download all Python wheels"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: ./nobodywho-python-release

      - name: "List wheels to include in release"
        run: ls -la ./nobodywho-python-release/

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-python-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release-flutter:
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required to create github release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: "Download all Flutter artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-flutter-*
          merge-multiple: true
          path: ./nobodywho-flutter-release

      - name: "List artifacts to include in release"
        run: ls -la ./nobodywho-flutter-release/

      - name: "Verify XCFramework zip is present"
        working-directory: ./nobodywho-flutter-release
        run: |
          if [ ! -f "nobodywho_flutter.xcframework.zip" ]; then
            echo "ERROR: nobodywho_flutter.xcframework.zip not found!"
            echo "Contents of release directory:"
            ls -la .
            exit 1
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-flutter-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release-android:
    if: startsWith(github.ref, 'refs/tags/nobodywho-android-v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: "Download Android SDK native libraries"
        uses: actions/download-artifact@v4
        with:
          pattern: nobodywho-android-sdk-*-release
          merge-multiple: true
          path: ./nobodywho-android-release

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-android-release/*.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-flutter-to-pubdev:
    needs: [create-github-release-flutter]
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: nobodywho/flutter/nobodywho

  create-github-release-swift:
    if: startsWith(github.ref, 'refs/tags/nobodywho-swift-')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: "Checkout nobodywho-swift"
        uses: actions/checkout@v4
        with:
          repository: Intiserahmed/nobodywho-swift
          ref: main
          token: ${{ secrets.SWIFT_REPO_TOKEN }}
          path: nobodywho-swift

      - name: "Download Swift XCFramework artifact"
        uses: actions/download-artifact@v4
        with:
          name: nobodywho-swift-xcframework
          path: ./nobodywho-swift-release

      - name: "Verify XCFramework zip is present"
        working-directory: ./nobodywho-swift-release
        run: |
          if [ ! -f "NobodyWhoFFI.xcframework.zip" ]; then
            echo "ERROR: NobodyWhoFFI.xcframework.zip not found!"
            ls -la .
            exit 1
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          files: ./nobodywho-swift-release/NobodyWhoFFI.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update Package.swift with release URL and checksum"
        run: |
          RELEASE_TAG="${{ github.ref_name }}"
          export RELEASE_URL="https://github.com/Intiserahmed/nobodywho-swift/releases/download/${RELEASE_TAG}/NobodyWhoFFI.xcframework.zip"
          export CHECKSUM=$(swift package compute-checksum ./nobodywho-swift-release/NobodyWhoFFI.xcframework.zip)
          echo "Release URL: $RELEASE_URL"
          echo "Checksum: $CHECKSUM"

          cd nobodywho-swift
          python3 << 'PYEOF'
          import re, pathlib, os
          url = os.environ["RELEASE_URL"]
          checksum = os.environ["CHECKSUM"]
          pkg = pathlib.Path("Package.swift").read_text()

          # Replace local path form: .binaryTarget(name: "NobodyWhoFFI", path: "NobodyWhoFFI.xcframework")
          replacement = f'.binaryTarget(\n            name: "NobodyWhoFFI",\n            url: "{url}",\n            checksum: "{checksum}"\n        )'
          pkg = re.sub(
              r'\.binaryTarget\s*\(\s*\n?\s*name:\s*"NobodyWhoFFI",\s*\n?\s*path:\s*"NobodyWhoFFI\.xcframework"\s*\n?\s*\)',
              replacement, pkg, flags=re.DOTALL
          )

          # Update existing url/checksum lines if already in remote form
          pkg = re.sub(r'(url:\s*)"[^"]*NobodyWhoFFI[^"]*"', rf'\g<1>"{url}"', pkg)
          pkg = re.sub(r'(checksum:\s*)"[^"]*"', rf'\g<1>"{checksum}"', pkg)

          pathlib.Path("Package.swift").write_text(pkg)
          print("Updated Package.swift")
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git diff --staged --quiet || git commit -m "Release ${RELEASE_TAG}: update xcframework URL and checksum"
          git push
