name: "Release"
on:
  workflow_call:
    secrets:
      TEST_PYPI_AUTH_TOKEN:
        required: true
      PYPI_AUTH_TOKEN:
        required: true
      NPM_TOKEN:
        required: true
      SWIFT_MIRROR_TOKEN:
        required: true
      MAVEN_CENTRAL_USERNAME:
        required: false
      MAVEN_CENTRAL_PASSWORD:
        required: false
      MAVEN_SIGNING_KEY:
        required: false
      MAVEN_SIGNING_PASSWORD:
        required: false

jobs:
  godot-distributable:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
        - uses: actions/checkout@v5
  
        - name: "Download all build artifacts"
          uses: actions/download-artifact@v5
          with:
            path: ./artifacts
  
        - name: "Make directory structure for release zip"
          run: |
            ADDON=nobodywho-release/bin/addons/nobodywho
            mkdir -p "$ADDON"
            # Lay each platform's libraries into a per-target subdirectory (the
            # dynamically-linked ggml/llama libs have generic filenames that would
            # collide between same-OS architectures in a flat dir). The binding
            # library's $ORIGIN/@loader_path rpath finds its ggml siblings there.
            for d in ./artifacts/nobodywho-godot-*/; do
              name=$(basename "$d"); rest=${name#nobodywho-godot-}
              triple=${rest%-debug}; triple=${triple%-release}
              mkdir -p "$ADDON/$triple"
              # binding library (+ .pdb) — profile-encoded name, debug & release coexist
              cp -P "$d"/*nobodywho-godot* "$ADDON/$triple/" 2>/dev/null || true
            done
            # ggml/llama libs: copy once per target from the release artifact
            # (a debug binding loads the release ggml — same ABI/version). Covers
            # both lib-prefixed (.so/.dylib) and MSVC (ggml.dll/llama.dll) names.
            for d in ./artifacts/nobodywho-godot-*-release/; do
              name=$(basename "$d"); triple=${name#nobodywho-godot-}; triple=${triple%-release}
              cp -P "$d"/libggml* "$d"/libllama* "$d"/ggml* "$d"/llama* "$ADDON/$triple/" 2>/dev/null || true
            done
            # copy in gdextension metadata
            cp ./nobodywho/godot/nobodywho.gdextension "$ADDON/"
            cp ./assets/icon.svg "$ADDON/"
        - name: "Upload zipped godot build artifacts"
          uses: actions/upload-artifact@v5
          with:
            name: nobodywho-godot-all-platforms
            path: ./nobodywho-release

  create-github-release-godot:
    needs: [godot-distributable]
    if: startsWith(github.ref, 'refs/tags/nobodywho-godot-')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: "Download build artifacts"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-godot-all-platforms
          path: ./nobodywho-release-godot

      - name: "Make zip file"
        working-directory: ./nobodywho-release-godot
        run: zip -r "../nobodywho-godot-${{ github.ref_name }}.zip" ./**

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: "./nobodywho-godot-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-publish-wheels:
      runs-on: warp-ubuntu-latest-x64-2x
      if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
      steps:
        - name: Download all wheels
          uses: actions/download-artifact@v5
          with:
            pattern: nobodywho_python_*
            merge-multiple: true
            path: dist/

        - name: List wheels to upload
          run: ls -la dist/
        - uses: actions/setup-python@v6
          with:
            python-version: "3.13"
        
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install twine

        - name: Publish to TestPyPI
          run: python -m twine upload --repository testpypi dist/*
          env:
            TWINE_USERNAME: __token__
            TWINE_PASSWORD: ${{ secrets.TEST_PYPI_AUTH_TOKEN }}

        - name: Download and pip install
          run: |
            python3 -m venv maturinvenv
            source ./maturinvenv/bin/activate
            python3 -m pip install --index-url https://test.pypi.org/simple/ nobodywho


  publish-wheels:
    needs:
      [
        test-publish-wheels
      ]
    runs-on: warp-ubuntu-latest-x64-2x
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: dist/

      - name: List wheels to upload
        run: ls -la dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_AUTH_TOKEN }}

  create-github-release-python:
    needs: [publish-wheels]
    if: startsWith(github.ref, 'refs/tags/nobodywho-python-')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - name: "Download all Python wheels"
        uses: actions/download-artifact@v5
        with:
          pattern: nobodywho_python_*
          merge-multiple: true
          path: ./nobodywho-python-release

      - name: "List wheels to include in release"
        run: ls -la ./nobodywho-python-release/

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-python-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-github-release-flutter:
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: write # Required to create github release
    steps:
      - uses: actions/checkout@v5

      - name: "Download all Flutter artifacts"
        uses: actions/download-artifact@v5
        with:
          # No merge-multiple: the ggml/llama libs have generic names and would
          # collide across targets. Each artifact stays in ./artifacts/<name>/.
          pattern: nobodywho-flutter-*
          path: ./artifacts

      - name: "Assemble Flutter release assets"
        run: |
          set -euo pipefail
          OUT=nobodywho-flutter-release
          mkdir -p "$OUT"
          # Apple xcframework (ggml embedded inside — shipped as one zip)
          cp artifacts/nobodywho-flutter-xcframework/nobodywho_flutter.xcframework.zip "$OUT/"
          # Desktop/Android: the triple-named binding lib + the ggml/llama libs
          # republished per-triple (base-<triple>-release.ext) matching what
          # tool/resolve_binary.dart downloads and renames back on the consumer.
          for d in artifacts/nobodywho-flutter-*-release/; do
            name=$(basename "$d"); triple=${name#nobodywho-flutter-}; triple=${triple%-release}
            [ "$triple" = "xcframework" ] && continue
            cp "$d"/libnobodywho-flutter-"$triple"-release.* "$OUT/" 2>/dev/null || true
            for f in "$d"/libggml*.so "$d"/libllama*.so "$d"/ggml*.dll "$d"/llama*.dll; do
              [ -e "$f" ] || continue
              b=$(basename "$f"); stem=${b%.*}; ext=${b##*.}
              cp "$f" "$OUT/${stem}-${triple}-release.${ext}"
            done
          done
          ls -la "$OUT"

      - name: "Verify XCFramework zip is present"
        working-directory: ./nobodywho-flutter-release
        run: |
          if [ ! -f "nobodywho_flutter.xcframework.zip" ]; then
            echo "ERROR: nobodywho_flutter.xcframework.zip not found!"
            ls -la .
            exit 1
          fi

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-flutter-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-flutter-to-pubdev:
    needs: [create-github-release-flutter]
    if: startsWith(github.ref, 'refs/tags/nobodywho-flutter-')
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: nobodywho/flutter/nobodywho

  # Create GitHub Release with native binaries, then publish to npm.
  create-github-release-react-native:
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-v')
    runs-on: warp-ubuntu-latest-x64-2x
    permissions:
      contents: write
    steps:
      - name: "Download Android ARM64 artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-uniffi-aarch64-linux-android-release
          path: ./rn-android-arm64

      - name: "Download Android x86_64 artifact"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-uniffi-x86_64-linux-android-release
          path: ./rn-android-x64

      - name: "Download iOS XCFramework"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-react-native-xcframework
          path: ./nobodywho-react-native-release

      - name: "Collect React Native release assets"
        run: |
          set -euo pipefail
          OUT=nobodywho-react-native-release
          # Per-ABI: keep the triple-named binding .so and republish the generically
          # named ggml/llama .so with a triple suffix (release assets are a flat
          # namespace — libggml.so from two ABIs would otherwise collide). The
          # Android gradle downloader renames them back to their SONAME in jniLibs.
          collect() { # $1=src-dir  $2=triple
            cp "$1/libnobodywho-uniffi-$2-release.so" "$OUT/"
            for so in "$1"/libggml*.so "$1"/libllama*.so; do
              [ -e "$so" ] || continue
              b=$(basename "$so" .so)
              cp "$so" "$OUT/${b}-$2.so"
            done
          }
          collect ./rn-android-arm64 aarch64-linux-android
          collect ./rn-android-x64  x86_64-linux-android
          ls -la "$OUT"

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./nobodywho-react-native-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-react-native-npm:
    needs: [create-github-release-react-native]
    if: startsWith(github.ref, 'refs/tags/nobodywho-react-native-v')
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - uses: actions/checkout@v5

      - name: "Setup Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: "Verify Login"
        working-directory: ./nobodywho/react-native
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish to npm"
        working-directory: ./nobodywho/react-native
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Create GitHub Release with xcframework, then push to nobodywho-swift mirror repo.
  create-github-release-swift:
    if: startsWith(github.ref, 'refs/tags/nobodywho-swift-')
    runs-on: warp-macos-15-arm64-6x
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: "Download Swift XCFramework"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-swift-xcframework
          path: ./release

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/NobodyWhoNative.xcframework.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Push to nobodywho-swift mirror repo"
        run: |
          TAG=$GITHUB_REF_NAME
          VERSION=${TAG#nobodywho-swift-v}
          CHECKSUM=$(shasum -a 256 release/NobodyWhoNative.xcframework.zip | cut -d' ' -f1)
          URL="https://github.com/nobodywho-ooo/nobodywho/releases/download/${TAG}/NobodyWhoNative.xcframework.zip"

          # Clone mirror repo
          git clone https://x-access-token:${{ secrets.SWIFT_MIRROR_TOKEN }}@github.com/nobodywho-ooo/nobodywho-swift.git mirror
          cd mirror

          # Clear and copy sources
          rm -rf src generated macros tests Package.swift README.md
          cp -r ../nobodywho/swift/src .
          mkdir -p generated
          cp ../nobodywho/swift/generated/nobodywho.swift generated/
          cp -r ../nobodywho/swift/macros .
          cp -r ../nobodywho/swift/tests .
          cp ../nobodywho/swift/Package.swift .
          cp ../nobodywho/swift/README.md .

          # Patch Package.swift: replace path: with url: + checksum:
          sed -i '' "s|path: \"Frameworks/NobodyWhoNative.xcframework\"|url: \"${URL}\",\n            checksum: \"${CHECKSUM}\"|" Package.swift

          # Commit, tag, push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${VERSION}"
          git tag "${VERSION}"
          git push origin main --force
          git push origin "${VERSION}"

  # Build AAR + JAR with native libs, create GitHub Release, publish to Maven Central.
  create-github-release-kotlin:
    if: startsWith(github.ref, 'refs/tags/nobodywho-kotlin-v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: "Download all uniffi release artifacts"
        uses: actions/download-artifact@v5
        with:
          # No merge-multiple: the ggml/llama libs have generic filenames and would
          # collide across targets if merged. Each artifact stays in its own dir.
          pattern: nobodywho-uniffi-*-release
          path: ./artifacts

      - name: "List artifacts"
        run: ls -la artifacts/

      # Place Android native libs for AAR. Android's loader resolves NEEDED libs
      # from the same jniLibs/<abi> dir, so co-locating ggml/llama there works.
      - name: "Setup Android jniLibs"
        run: |
          mkdir -p nobodywho/kotlin/android/build/jniLibs/{arm64-v8a,x86_64}
          place_android() { # $1=target $2=abi
            local d="artifacts/nobodywho-uniffi-$1-release"
            cp "$d/libnobodywho-uniffi-$1-release.so" \
              "nobodywho/kotlin/android/build/jniLibs/$2/libnobodywho_uniffi.so"
            cp -P "$d"/libggml*.so* "$d"/libllama*.so* "nobodywho/kotlin/android/build/jniLibs/$2/" 2>/dev/null || true
          }
          place_android aarch64-linux-android arm64-v8a
          place_android x86_64-linux-android  x86_64

      # Place desktop native libs for JVM JAR (JNA layout).
      # NOTE: JNA extracts only the *named* library to a temp dir at load time, not
      # its sibling dependencies, so the co-located ggml/llama libs here are not yet
      # discoverable by the extracted lib's $ORIGIN/@loader_path rpath. The Kotlin
      # `common` loader must be updated to extract ALL libs in the resource dir to a
      # shared temp dir (and add it to jna.library.path) before Native.load — see
      # nobodywho/kotlin/common. Files are placed here so that change can land next.
      - name: "Setup JVM native libs"
        run: |
          mkdir -p nobodywho/kotlin/jvm/src/main/resources/{linux-x86-64,linux-aarch64,darwin-aarch64,win32-x86-64}
          place_jvm() { # $1=target $2=jna-dir $3=libname
            local d="artifacts/nobodywho-uniffi-$1-release"
            cp "$d/libnobodywho-uniffi-$1-release.$4" \
              "nobodywho/kotlin/jvm/src/main/resources/$2/$3"
            cp -P "$d"/libggml* "$d"/libllama* "$d"/ggml* "$d"/llama* \
              "nobodywho/kotlin/jvm/src/main/resources/$2/" 2>/dev/null || true
          }
          place_jvm x86_64-unknown-linux-gnu  linux-x86-64   libnobodywho_uniffi.so    so
          place_jvm aarch64-unknown-linux-gnu linux-aarch64  libnobodywho_uniffi.so    so
          place_jvm aarch64-apple-darwin      darwin-aarch64 libnobodywho_uniffi.dylib dylib
          place_jvm x86_64-pc-windows-msvc    win32-x86-64   nobodywho_uniffi.dll      dll

      - name: "Setup JDK"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: "Setup Android SDK"
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;34.0.0"

      # Set version from tag
      - name: "Set version"
        run: |
          VERSION=${GITHUB_REF_NAME#nobodywho-kotlin-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: "Build AAR and JAR"
        working-directory: ./nobodywho/kotlin
        run: |
          ./gradlew :android:assembleRelease :jvm:jar \
            -Pversion=${{ env.VERSION }}

      - name: "Collect release artifacts"
        run: |
          mkdir -p release
          cp nobodywho/kotlin/android/build/outputs/aar/android-release.aar \
            release/nobodywho-android-${{ env.VERSION }}.aar
          cp nobodywho/kotlin/jvm/build/libs/jvm-${{ env.VERSION }}.jar \
            release/nobodywho-${{ env.VERSION }}.jar

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Publish to Maven Central"
        working-directory: ./nobodywho/kotlin
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: ./gradlew publishAggregationToCentralPortal -Pversion=${{ env.VERSION }}
