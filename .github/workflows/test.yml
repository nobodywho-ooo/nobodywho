name: "Test"
on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full test suite. If false, only lightweight checks run."
        type: boolean
        default: false
      run_nix:
        description: "Run nix flake check."
        type: boolean
        default: false
    secrets:
      CACHIX_AUTH_TOKEN:
        required: true


jobs:


  flutter-doc-tests-check:
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate doctest file
        working-directory: nobodywho/flutter/nobodywho
        run: dart run tool/doctest.dart ../../../docs/docs-flutter --generate-only

      - name: Check if generated tests are up to date
        run: |
          if git diff --quiet nobodywho/flutter/nobodywho/test/doctest_generated_test.dart; then
            echo "✅ Generated doctests are up to date"
          else
            echo "❌ Generated doctests are out of date!"
            echo ""
            echo "Please run the following command and commit the changes:"
            echo "dart run tool/doctest.dart ../../../docs/docs-flutter --generate-only"
            exit 1
          fi



  # cachix actions as per these docs:
  # https://nix.dev/guides/recipes/continuous-integration-github-actions
  nix-flake-check:
    if: inputs.run_nix
    runs-on: warp-ubuntu-latest-x64-4x
    timeout-minutes: 360
    steps:
      - name: Check that Cachix Token is set
        run: |
          if [ -z "${{ secrets.CACHIX_AUTH_TOKEN }}" ]; then
            echo "❌ Token is empty!"
          else
            echo "✅ Token exists (length: ${#CACHIX_AUTH_TOKEN})"
          fi
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: nobodywho
          # If you chose API tokens for write access OR if you have a private cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # verbose! debug debug
          cachixArgs: "--verbose -j8"

      - name: "nix flake check"
        run: |
          nix --extra-experimental-features nix-command --extra-experimental-features flakes flake check -L --max-jobs 1


  flutter-multimodal-tests:
    if: inputs.full_ci
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v5

      # Test what we ship: use the prebuilt flutter cdylib + its dynamic-link
      # ggml/llama libs from the build job (the parent `test` job's needs: [build]
      # in main.yml guarantees they exist) instead of rebuilding here.
      - name: Download flutter Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-flutter-x86_64-unknown-linux-gnu-release
          path: ./native-lib

      - name: Name the cdylib for flutter_rust_bridge
        run: |
          # frb dlopens the bare name `libnobodywho_flutter.so`; the artifact ships it
          # under the per-triple name. Its sibling libggml*/libllama* (already
          # unversioned, each with an $ORIGIN rpath) resolve from the same dir.
          cp ./native-lib/libnobodywho-flutter-x86_64-unknown-linux-gnu-release.so \
            ./native-lib/libnobodywho_flutter.so

      - name: Install Vulkan runtime
        # The shipped ggml links libvulkan; provide the loader at test runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: Download vision models
        run: |
          mkdir -p models
          curl -L --fail --progress-bar https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf -o models/gemma-3-4b-it-Q4_K_M.gguf
          curl -L --fail --progress-bar https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/mmproj-F16.gguf -o models/mmproj-gemma-3-f16.gguf

      - name: Run Flutter multimodal tests
        working-directory: ./nobodywho/flutter/nobodywho
        env:
          TEST_MULTIMODAL_MODEL: ${{ github.workspace }}/models/gemma-3-4b-it-Q4_K_M.gguf
          TEST_MULTIMODAL_MMPROJ: ${{ github.workspace }}/models/mmproj-gemma-3-f16.gguf
          LD_LIBRARY_PATH: ${{ github.workspace }}/native-lib
        run: flutter test test/nobodywho_multimodal_test.dart --reporter expanded


  flutter-stt-tests:
    if: inputs.full_ci
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Test what we ship: use the prebuilt flutter cdylib + its dynamic-link
      # ggml/llama libs from the build job (the parent `test` job's needs: [build]
      # in main.yml guarantees they exist) instead of rebuilding here. ONNX Runtime
      # is statically linked into the cdylib, so no separate onnx lib is needed.
      - name: Download flutter Linux artifact
        uses: actions/download-artifact@v5
        with:
          name: nobodywho-flutter-x86_64-unknown-linux-gnu-release
          path: ./native-lib

      - name: Name the cdylib for flutter_rust_bridge
        run: |
          # frb dlopens the bare name `libnobodywho_flutter.so`; the artifact ships it
          # under the per-triple name. Its sibling libggml*/libllama* (already
          # unversioned, each with an $ORIGIN rpath) resolve from the same dir.
          cp ./native-lib/libnobodywho-flutter-x86_64-unknown-linux-gnu-release.so \
            ./native-lib/libnobodywho_flutter.so

      - name: Install Vulkan runtime
        # The shipped ggml links libvulkan; provide the loader at test runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan1

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: 3.35.5

      - name: Download Whisper model
        run: |
          # fp32 ("default") files, matching the Flutter STT test's quantization='default'.
          WHISPER_BASE="https://huggingface.co/onnx-community/whisper-base/resolve/main"
          mkdir -p models/whisper-base/onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/onnx/encoder_model.onnx"       -o models/whisper-base/onnx/encoder_model.onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/onnx/decoder_model_merged.onnx" -o models/whisper-base/onnx/decoder_model_merged.onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/tokenizer.json"                 -o models/whisper-base/tokenizer.json
          curl -L --fail --progress-bar "$WHISPER_BASE/generation_config.json"         -o models/whisper-base/generation_config.json
          curl -L --fail --progress-bar "$WHISPER_BASE/config.json"                    -o models/whisper-base/config.json
          curl -L --fail --progress-bar "$WHISPER_BASE/preprocessor_config.json"       -o models/whisper-base/preprocessor_config.json

      - name: Run Flutter STT tests
        working-directory: ./nobodywho/flutter/nobodywho
        env:
          TEST_WHISPER_MODEL: ${{ github.workspace }}/models/whisper-base
          TEST_AUDIO_FILE: ${{ github.workspace }}/assets/sound.mp3
          LD_LIBRARY_PATH: ${{ github.workspace }}/native-lib
        run: flutter test test/nobodywho_test.dart --name "STT" --reporter expanded
