name: "Test"
on:
  workflow_call:
    secrets:
      UNITY_EMAIL:  
        required: true
      UNITY_PASSWORD:
        required: true
      UNITY_LICENSE:
        required: true

jobs:
  nix-flake-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: "Install distro dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 # ...needed to install nix
      - run: |
          sh <(curl -L https://nixos.org/nix/install) --no-daemon
      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v5
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          gc-max-store-size-linux: 10000000000
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: cache-${{ runner.os }}-
          # created more than this number of seconds ago relative to the start of the `Post Restore` phase
          purge-created: 0
          # except the version with the `primary-key`, if it exists
          purge-primary-key: never
      - name: "nix flake check"
        run: |
          . ~/.nix-profile/etc/profile.d/nix.sh
          nix --extra-experimental-features nix-command --extra-experimental-features flakes flake check -L

  run-unity-test:
    name: Unity Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Create StreamingAssets directory
          run: |
            mkdir -p ./nobodywho/unity/src/Assets/StreamingAssets


        - name: Cache Models
          uses: actions/cache@v3
          id: model-cache
          with:
            path: |
              ./TempProject/Assets/StreamingAssets/qwen2.5-1.5b-instruct-q4_0.gguf
              ./TempProject/Assets/StreamingAssets/bge-small-en-v1.5-q8_0.gguf
            key: unity-testing-models-${{ hashFiles('**/justfile') }}
            restore-keys: |
              unity-testing-models-

        - name: Download Models
          if: steps.model-cache.outputs.cache-hit != 'true'
          run: |
            curl -L --fail --progress-bar "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_0.gguf" \
              -o "./nobodywho/unity/src/Assets/StreamingAssets/qwen2.5-1.5b-instruct-q4_0.gguf"
            
            curl -L --fail --progress-bar "https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf" \
              -o "./nobodywho/unity/src/Assets/StreamingAssets/bge-small-en-v1.5-q8_0.gguf"
        
        - name: move models to BlankProject
          run: |
            mkdir -p ./TempProject/Assets/StreamingAssets
            mv ./nobodywho/unity/src/Assets/StreamingAssets/qwen2.5-1.5b-instruct-q4_0.gguf ./TempProject/Assets/StreamingAssets/qwen2.5-1.5b-instruct-q4_0.gguf
            mv ./nobodywho/unity/src/Assets/StreamingAssets/bge-small-en-v1.5-q8_0.gguf ./TempProject/Assets/StreamingAssets/bge-small-en-v1.5-q8_0.gguf

        - name: "Setup rust toolchain"
          run: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            rustup update stable
            rustup default stable
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
            sudo apt-get update
            sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc

        - name: "Compile for linux"
          run: cargo build -p nobodywho-unity  --verbose
          working-directory: ./nobodywho

        - name: rename libnobodywho.so
          run: |
            mkdir -p ./nobodywho/unity/src/Runtime/Plugins/x86_64
            mv ./nobodywho/target/debug/libnobodywho_unity.so ./nobodywho/unity/src/Runtime/Plugins/x86_64/libnobodywho.so

        - name: Run Tests
          uses: game-ci/unity-test-runner@v4
          env:
            UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
            UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          with:             
            packageMode: true
            projectPath: ./nobodywho/unity/src
            testMode: playmode
            unityVersion: 6000.0.47f1
        
        - name: Open sshx if earlier step failed
          if: failure()           # guard so it runs only on red builds
          run: |
            curl -sSf https://sshx.io/get | sh -s run
            # script prints a https://sshx.io/s/… URL and blocks
