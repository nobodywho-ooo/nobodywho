name: "napi_ci"

on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full napi CI (cross-platform builds). If false, only linux x64 build runs."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux-build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            napi_target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            napi_target: aarch64-unknown-linux-gnu
        exclude:
          - target: ${{ !inputs.full_ci && 'aarch64-unknown-linux-gnu' || 'NEVER_EXCLUDE' }}

    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.runner == 'ubuntu-24.04' && '-C target-cpu=x86-64-v3' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: "Cache Cargo Home"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-napi-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-napi-${{ matrix.target }}-

      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Install Vulkan dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Install napi-rs CLI"
        run: npm install -g @napi-rs/cli

      - name: "Build native module"
        working-directory: ./nobodywho/napi
        run: |
          npm install
          napi build --release --target ${{ matrix.napi_target }} -- --locked

      - name: "Build TypeScript wrapper"
        working-directory: ./nobodywho/napi
        run: npx tsc

      - name: "Run tests (no model)"
        working-directory: ./nobodywho/napi
        run: node --test test.mjs

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-napi-${{ matrix.target }}
          path: ./nobodywho/napi/*.node

  windows-build:
    if: inputs.full_ci
    runs-on: windows-latest
    env:
      RUSTFLAGS: >-
        -l Advapi32
        -C target-cpu=x86-64-v3
    steps:
      - uses: actions/checkout@v4

      - name: "Cache Cargo Home"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            nobodywho/target
          key: ${{ runner.os }}-cargo-home-napi-x86_64-pc-windows-msvc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-home-napi-x86_64-pc-windows-msvc-

      - name: "Install Rust"
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: "Install Vulkan SDK"
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          vulkan_version: 1.4.304.0
          cache: true
          install_runtime: true
          stripdown: true

      - name: "Install Ninja"
        run: choco install ninja

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Install napi-rs CLI"
        run: npm install -g @napi-rs/cli

      - name: "Build native module"
        run: |
          mv ./nobodywho/* C:/
          cd C:/napi
          npm install
          # Note: no `-- --locked` here — PowerShell doesn't pass `--` through correctly to napi
          napi build --release --target x86_64-pc-windows-msvc --target-dir C:/t
        env:
          CMAKE_GENERATOR: "Ninja"

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-napi-x86_64-pc-windows-msvc
          path: C:/napi/*.node

  macos-build:
    if: inputs.full_ci
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: "Setup rust toolchain"
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Install napi-rs CLI"
        run: npm install -g @napi-rs/cli

      - name: "Build native module"
        working-directory: ./nobodywho/napi
        run: |
          npm install
          napi build --release --target ${{ matrix.target }} -- --locked

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: nobodywho-napi-${{ matrix.target }}
          path: ./nobodywho/napi/*.node
