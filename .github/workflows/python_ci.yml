            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: "Download wheel"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_windows_${{ matrix.target }}
          path: ./wheels
      - name: Install wheel
        run: |
          python -m venv maturinvenv
          maturinvenv/Scripts/activate
          pip install (Get-ChildItem ./wheels/nobodywho*.whl).FullName

      - name: Download models
        run: |
          mkdir -p ${{ github.workspace }}/windows/nobodywho_python/models
          pip install -U "huggingface_hub"
          Invoke-WebRequest ${{ matrix.model_link }} -OutFile "${{ github.workspace }}/windows/nobodywho_python/models/${{ matrix.model_name}}"

