name: "python_ci"

on:
  workflow_call:
    inputs:
      full_ci:
        description: "Run full Python CI (builds, tests, pip-install checks). If false, only static checks run."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: nobodywho/python/uv.lock

      - name: Install dependencies
        working-directory: ./nobodywho/python
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev cmake libshaderc-dev libvulkan-dev glslc
          uv venv
          uv sync --locked

      - name: Format check
        working-directory: ./nobodywho/python
        run: uv run ruff format --check

      - name: Lint check
        working-directory: ./nobodywho/python
        run: uv run ruff check

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nobodywho
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Regenerate stubs
        working-directory: ./nobodywho/python
        run: cargo build && cargo run --bin make_stubs

      - name: Format generated stubs
        working-directory: ./nobodywho/python
        run: uv run ruff format nobodywho.pyi

      - name: Check generated stubs
        working-directory: ./nobodywho/python
        run: |
          if git diff --quiet -- nobodywho.pyi; then
            echo "✅ Generated stubs are up to date"
          else
            echo "❌ Generated stubs are outdated. Run:"
            echo "   cargo build"
            echo "   cargo run --bin make_stubs"
            echo "   uv run ruff format nobodywho.pyi"
            git --no-pager diff -- nobodywho.pyi
            exit 1
          fi

      - name: Type check
        working-directory: ./nobodywho/python
        run: uv run ty check

  linux-build:
    if: inputs.full_ci
    # Build inside manylinux_2_34 container for glibc 2.34 compatibility
    # This targets glibc version 2.34 which covers most distros going back to 2021
    # See: https://github.com/mayeut/pep600_compliance?tab=readme-ov-file#distro-compatibility

    strategy:
      fail-fast: false
      matrix:
        runner: [warp-ubuntu-latest-x64-4x, warp-ubuntu-latest-arm64-4x]
        include:
          - runner: warp-ubuntu-latest-x64-4x
            manylinux_target: manylinux_2_34_x86_64
          - runner: warp-ubuntu-latest-arm64-4x
            manylinux_target: manylinux_2_34_aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/pypa/${{ matrix.manylinux_target }}
    env:
      RUSTFLAGS: ${{ matrix.runner == 'warp-ubuntu-latest-x64-4x' && '-C target-cpu=x86-64-v3' || '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          # The new ggml-vulkan backend needs SPIRV-HeadersConfig.cmake, only
          # bundled in the SDK from ~1.4.313+. Linux uses .0 (not the Windows
          # job's .2): jakoch's ARM-Linux mirror (jakoch/vulkan-sdk-arm) only
          # publishes 1.4.313.0, and 1.4.313.2 fails to download for arm64.
          vulkan_version: 1.4.313.0
          cache: true

      - name: Install build dependencies
        run: |
          yum install -y clang cmake wget tar gzip python3-pip
          pip3 install maturin auditwheel

      - name: Setup Vulkan SDK (manual for ARM64)
        if: matrix.runner == 'warp-ubuntu-latest-arm64-4x'
        run: |
          SDK_VERSION="1.4.304.0"
          SDK_URL="https://github.com/jakoch/vulkan-sdk-arm/releases/download/${SDK_VERSION}/vulkansdk-ubuntu-22.04-arm-${SDK_VERSION}.tar.xz"

          # Download and extract Vulkan SDK
          cd /tmp
          wget -q "$SDK_URL" -O vulkan-sdk.tar.xz
          tar -xf vulkan-sdk.tar.xz

          # ARM64 SDK has architecture-specific subdirectory
          SDK_DIR="/tmp/$(ls -d */ | grep -E '^[0-9]' | head -n1)"
          VULKAN_SDK="${SDK_DIR%/}/aarch64"

          # Persist to GitHub environment
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "$VULKAN_SDK/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$VULKAN_SDK/lib" >> $GITHUB_ENV

          # Build shaderc to get glslc compiler (not included in ARM64 SDK)
          yum install -y python3 git
          cd /tmp
          git clone --depth 1 --branch v2024.3 https://github.com/google/shaderc.git
          cd shaderc
          ./utils/git-sync-deps

          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="$VULKAN_SDK" \
                -DSHADERC_SKIP_TESTS=ON \
                -DSHADERC_SKIP_EXAMPLES=ON \
                ..
          make -j$(nproc)

          # Copy glslc to SDK bin directory
          cp glslc/glslc "$VULKAN_SDK/bin/" || { echo "ERROR: glslc not found"; exit 1; }

      - name: Build linux python wheel
        run: |
          source "$HOME/.cargo/env"
          maturin build --verbose --release --locked
        working-directory: ./nobodywho/python

      - name: Bundle native libs into the wheel
        # maturin already tags this wheel manylinux_2_34, so auditwheel's only real
        # job would be vendoring the native libs — but its relocation is unusable
        # here: it fails "libX-<hash>.so could not be located" grafting the
        # inter-dependent ggml libs, and even fails the same way on a plain system
        # lib (libgomp). So we vendor the libs ourselves and skip `auditwheel repair`.
        # We co-locate the (unversioned) ggml/llama libs + the OpenMP runtime next to
        # the extension module with an $ORIGIN rpath; libstdc++, libc/libm and the
        # Vulkan loader stay system/driver-provided (as for the Godot/Flutter Linux
        # artifacts). Unversioning (libX.so.N -> libX.so) also matches Android/Godot.
        run: |
          set -eux
          pip3 install wheel
          whl="$(ls nobodywho/target/wheels/nobodywho*.whl)"
          work="$(mktemp -d)"; stage="$(mktemp -d)"
          python3 -m wheel unpack "$whl" -d "$work"
          pkg="$(echo "$work"/nobodywho-*/)"
          extdir="$(dirname "$(find "$pkg" -name '*.abi3.so' | head -1)")"

          # Stage the ggml/llama libs + the extension, then unversion (renames
          # libX.so.N -> libX.so, sets unversioned SONAMEs, repoints every DT_NEEDED
          # including the extension's).
          libdir="$(find "$(pwd)/nobodywho/target/release" -name 'libggml.so.0.13.1' -printf '%h\n' 2>/dev/null | head -1)"
          [ -n "$libdir" ] || libdir="$(find "$(pwd)/nobodywho/target/release" -name 'libggml*.so.*' -printf '%h\n' | head -1)"
          cp "$libdir"/libggml*.so* "$libdir"/libllama*.so* "$stage"/
          find "$pkg" -name '*.abi3.so' -exec cp {} "$stage/" \;
          bash nobodywho/scripts/unversion-elf-libs.sh "$stage"

          # Co-locate the ggml/llama libs next to the extension, each with $ORIGIN.
          for l in "$stage"/libggml*.so "$stage"/libllama*.so; do
            patchelf --set-rpath '$ORIGIN' "$l"
            cp "$l" "$extdir"/
          done
          # Bundle the OpenMP runtime so the wheel doesn't require it preinstalled.
          gomp="$(find /opt/rh /usr/lib /usr/lib64 -name 'libgomp.so.1*' -type f 2>/dev/null | head -1)"
          [ -n "$gomp" ] && cp "$gomp" "$extdir"/libgomp.so.1
          # Put the patched extension module(s) back.
          find "$pkg" -name '*.abi3.so' | while read -r w; do cp "$stage/$(basename "$w")" "$w"; done

          # Repack (rebuilds RECORD); the manylinux_2_34 tag is preserved.
          mkdir -p wheelhouse
          python3 -m wheel pack "$pkg" -d wheelhouse
          ls -l wheelhouse "$extdir"

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho_python_linux_${{ matrix.manylinux_target }}
          path: ./wheelhouse/nobodywho*.whl

  windows-build:
    if: inputs.full_ci
    strategy:
      fail-fast: false
      matrix:
        target:
          - "x86_64-pc-windows-msvc"
    runs-on: windows-latest
    env:
      RUSTFLAGS: -l Advapi32 -C target-cpu=x86-64-v3
      # libgit2 (cargo's default git backend) ignores core.longpaths, so the deep
      # llama.cpp tools/ui/ submodule paths exceed Windows' 260-char MAX_PATH even
      # though LongPathsEnabled + core.longpaths are set below. Fetch with the git
      # CLI instead, which honors core.longpaths and uses \\?\ extended paths.
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install maturin
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.2.5
        with:
          # 1.4.313.2 matches llama.cpp's own Windows Vulkan CI. The newer
          # ggml-vulkan backend does find_package(SPIRV-Headers CONFIG REQUIRED);
          # SPIRV-HeadersConfig.cmake is only bundled in the SDK from ~1.4.313+,
          # so 1.4.304.0 fails to configure. (Discovery uses the VULKAN_SDK env
          # var this action sets; stripdown doesn't touch the cmake config.)
          vulkan_version: 1.4.313.2
          install_runtime: false
          cache: true
          stripdown: true
      - name: Install Ninja
        run: choco install ninja

      - name: "Build windows python wheel"
        run: |
          mv ./nobodywho/* C:/
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true
          cd C:/
          cd python
          maturin build --verbose --release --locked --target ${{ matrix.target }}
        env:
          # Use Ninja generator instead of Visual Studio generator.
          # This fixes a CMake ExternalProject issue where vulkan-shaders-gen's
          # install step fails to find cmake_install.cmake with the VS generator.
          # Ninja's simpler build structure avoids this problem entirely.
          CMAKE_GENERATOR: "Ninja"
      - name: "Delvewheel repair (bundle ggml/llama DLLs)"
        # delvewheel vendors the dynamically-linked ggml/llama DLLs into the wheel.
        # --add-path points it at the built DLLs (in the short C:/target dir used above).
        run: |
          pip install delvewheel
          delvewheel repair --add-path C:/target/${{ matrix.target }}/release -w C:/wheelhouse (Get-Item C:/target/wheels/nobodywho*.whl).FullName
      - name: "Upload wheel artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho_python_windows_${{ matrix.target }}
          path: C:/wheelhouse/nobodywho*.whl

  mac-os-build:
    if: inputs.full_ci
    runs-on: warp-macos-latest-arm64-6x
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: brew install maturin
      - name: "Build macos python wheel"
        run: maturin build --verbose --release --locked --target aarch64-apple-darwin
        working-directory: ./nobodywho/python

      - name: "Delocate wheel (bundle ggml/llama dylibs)"
        # delocate copies the dynamically-linked ggml/llama dylibs into the wheel
        # and rewrites install names. DYLD_*_LIBRARY_PATH points it at the built
        # dylibs so it can resolve the extension's @rpath dependencies.
        run: |
          pip3 install delocate
          export DYLD_LIBRARY_PATH="$(pwd)/nobodywho/target/aarch64-apple-darwin/release:${DYLD_LIBRARY_PATH:-}"
          export DYLD_FALLBACK_LIBRARY_PATH="$DYLD_LIBRARY_PATH"
          mkdir -p wheelhouse
          delocate-wheel -w wheelhouse -v nobodywho/target/wheels/nobodywho*.whl

      - name: "Upload build artifact"
        uses: actions/upload-artifact@v5
        with:
          name: nobodywho_python_macos
          path: ./wheelhouse/nobodywho*.whl

  linux-pytest:
    if: inputs.full_ci
    needs: [linux-build]
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: nobodywho/python/uv.lock
      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_linux_manylinux_2_34_x86_64
          path: ./wheels
      - name: Download test models
        run: |
          mkdir -p models
          curl -L --fail --progress-bar https://huggingface.co/bartowski/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf -o models/Qwen_Qwen3-0.6B-Q4_K_M.gguf
          curl -L --fail --progress-bar https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf -o models/bge-small-en-v1.5-q8_0.gguf
          curl -L --fail --progress-bar https://huggingface.co/gpustack/bge-reranker-v2-m3-GGUF/resolve/main/bge-reranker-v2-m3-Q8_0.gguf -o models/bge-reranker-v2-m3-Q8_0.gguf
          curl -L --fail --progress-bar https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/google_gemma-4-E2B-it-Q4_K_M.gguf -o models/google_gemma-4-E2B-it-Q4_K_M.gguf
          curl -L --fail --progress-bar https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/mmproj-google_gemma-4-E2B-it-f16.gguf -o models/mmproj-google_gemma-4-E2B-it-f16.gguf
          # Whisper ONNX — only the files we actually load. The STT tests
          # request quantization="default" (fp32), so we download the unsuffixed
          # ONNX files here. (Keep in sync with the tests and models.nix.)
          WHISPER_BASE="https://huggingface.co/onnx-community/whisper-base/resolve/main"
          mkdir -p models/whisper-base/onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/onnx/encoder_model.onnx"       -o models/whisper-base/onnx/encoder_model.onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/onnx/decoder_model_merged.onnx" -o models/whisper-base/onnx/decoder_model_merged.onnx
          curl -L --fail --progress-bar "$WHISPER_BASE/tokenizer.json"                 -o models/whisper-base/tokenizer.json
          curl -L --fail --progress-bar "$WHISPER_BASE/generation_config.json"         -o models/whisper-base/generation_config.json
          curl -L --fail --progress-bar "$WHISPER_BASE/config.json"                    -o models/whisper-base/config.json
          curl -L --fail --progress-bar "$WHISPER_BASE/preprocessor_config.json"       -o models/whisper-base/preprocessor_config.json
      - name: Set up virtualenv and install dependencies
        working-directory: ./nobodywho/python
        run: |
          uv venv
          # install deps - and not nobodywho-python - into the venv
          uv sync --locked --no-install-project --group dev
          # install nobodywho from pre-built wheel
          uv pip install ../../wheels/nobodywho*manylinux*x86*.whl
      - name: Run pytest
        working-directory: ./nobodywho/python
        env:
          TEST_MODEL: ${{ github.workspace }}/models/Qwen_Qwen3-0.6B-Q4_K_M.gguf
          TEST_EMBEDDINGS_MODEL: ${{ github.workspace }}/models/bge-small-en-v1.5-q8_0.gguf
          TEST_CROSSENCODER_MODEL: ${{ github.workspace }}/models/bge-reranker-v2-m3-Q8_0.gguf
          TEST_VISION_MODEL: ${{ github.workspace }}/models/google_gemma-4-E2B-it-Q4_K_M.gguf
          TEST_MMPROJ_MODEL: ${{ github.workspace }}/models/mmproj-google_gemma-4-E2B-it-f16.gguf
          TEST_WHISPER_MODEL: ${{ github.workspace }}/models/whisper-base
        run: |
          source .venv/bin/activate
          # python bindings tests (model downloading has its own dedicated job)
          python3 -m pytest --ignore=tests/test_model_downloading.py
          # docs tests
          python3 -m pytest --markdown-docs ../../docs --markdown-docs-syntax=superfences

  linux-multimodal-tests:
    if: inputs.full_ci
    needs: [linux-build]
    runs-on: warp-ubuntu-latest-x64-4x
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: nobodywho/python/uv.lock
      - name: Download wheel
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_linux_manylinux_2_34_x86_64
          path: ./wheels
      - name: Download vision models
        run: |
          mkdir -p models
          curl -L --fail --progress-bar https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/google_gemma-4-E2B-it-Q4_K_M.gguf -o models/google_gemma-4-E2B-it-Q4_K_M.gguf
          curl -L --fail --progress-bar https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/mmproj-google_gemma-4-E2B-it-f16.gguf -o models/mmproj-google_gemma-4-E2B-it-f16.gguf
      - name: Set up virtualenv and install dependencies
        working-directory: ./nobodywho/python
        run: |
          uv venv
          uv sync --locked --no-install-project --group dev
          uv pip install ../../wheels/nobodywho*manylinux*x86*.whl
      - name: Run multimodal tests
        working-directory: ./nobodywho/python
        env:
          TEST_VISION_MODEL: ${{ github.workspace }}/models/google_gemma-4-E2B-it-Q4_K_M.gguf
          TEST_MMPROJ_MODEL: ${{ github.workspace }}/models/mmproj-google_gemma-4-E2B-it-f16.gguf
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/test_multimodal.py -v --tb=short
  

  linux-model-downloading-tests:
    needs: [linux-build]
    runs-on: warp-ubuntu-latest-x64-2x
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: nobodywho/python/uv.lock

      - name: Download wheel artifact
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_linux_manylinux_2_34_x86_64
          path: ./wheels

      - name: Set up virtualenv and install dependencies
        working-directory: ./nobodywho/python
        run: |
          uv venv
          uv sync --locked --no-install-project --group dev
          uv pip install ../../wheels/nobodywho*manylinux*x86*.whl

      - name: Run model downloading tests
        working-directory: ./nobodywho/python
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/test_model_downloading.py -v --tb=short
      - name: Display test summary
        if: always()
        run: |
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
    

  linux-tool-calling-tests:
    if: inputs.full_ci
    needs: [linux-build]
    runs-on: warp-ubuntu-latest-x64-4x
    strategy:
      fail-fast: false
      matrix:
        model:
          - name: Qwen3
            file: Qwen_Qwen3-0.6B-Q4_K_M.gguf
            url: https://huggingface.co/bartowski/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf
            format: Qwen3
          - name: Qwen3.5
            file: Qwen3.5-0.8B-Q4_K_M.gguf
            url: https://huggingface.co/unsloth/Qwen3.5-0.8B-GGUF/resolve/main/Qwen3.5-0.8B-Q4_K_M.gguf
            format: Qwen35_36
          - name: FunctionGemma
            file: functiongemma-270m-it-BF16.gguf
            url: https://huggingface.co/unsloth/functiongemma-270m-it-GGUF/resolve/main/functiongemma-270m-it-BF16.gguf
            format: FunctionGemma
          - name: Ministral3
            file: mistralai_Ministral-3-3B-Instruct-2512-Q6_K_L.gguf
            url: https://huggingface.co/bartowski/mistralai_Ministral-3-3B-Instruct-2512-GGUF/resolve/main/mistralai_Ministral-3-3B-Instruct-2512-Q6_K_L.gguf
            format: Ministral3
          - name: Gemma4
            file: gemma-4-E2B-it-Q4_0.gguf
            url: https://huggingface.co/unsloth/gemma-4-E2B-it-GGUF/resolve/main/gemma-4-E2B-it-Q4_0.gguf
            format: Gemma4
          - name: LFM2.5-VL 1.6B
            file: LFM2.5-VL-1.6B-Q8_0-vendor-sampling.gguf
            url: https://huggingface.co/NobodyWho/LFM2.5-VL-1.6B-GGUF/resolve/main/LFM2.5-VL-1.6B-Q8_0-vendor-sampling.gguf
            format: LFM2.5

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: nobodywho/python/uv.lock

      - name: Download wheel artifact
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_linux_manylinux_2_34_x86_64
          path: ./wheels

      - name: Download ${{ matrix.model.name }} model
        run: |
          mkdir -p models
          curl -L --fail --progress-bar \
            ${{ matrix.model.url }} \
            -o models/${{ matrix.model.file }}
          echo "Model size:"
          ls -lh models/${{ matrix.model.file }}

      - name: Set up virtualenv and install dependencies
        working-directory: ./nobodywho/python
        run: |
          uv venv
          uv sync --locked --no-install-project --group dev
          uv pip install ../../wheels/nobodywho*manylinux*x86*.whl

      - name: Run tool calling tests with ${{ matrix.model.name }}
        working-directory: ./nobodywho/python
        env:
          TEST_MODEL: ${{ github.workspace }}/models/${{ matrix.model.file }}
        run: |
          source .venv/bin/activate
          python3 -m pytest tests/test_tool_calling.py -v --tb=short
      - name: Display test summary
        if: always()
        run: |
          echo "### Tool Calling Tests: ${{ matrix.model.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ matrix.model.file }}" >> $GITHUB_STEP_SUMMARY
          echo "- Format: ${{ matrix.model.format }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  linux-pip-install-test:
    if: inputs.full_ci
    needs: [linux-build]
    strategy:
      fail-fast: false
      matrix:
        model: [Qwen, Gemma]
        runner: [warp-ubuntu-latest-x64-4x, warp-ubuntu-latest-arm64-4x]
        include:
          - model: Qwen
            model_name: Qwen3-0.6B-UD-Q6_K_XL.gguf
            model_iterations: 10
            model_link: https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-UD-Q6_K_XL.gguf
          - model: Gemma
            model_name: google_gemma-3-4b-it-Q4_1.gguf
            model_iterations: 10
            model_link: https://huggingface.co/bartowski/google_gemma-3-4b-it-GGUF/resolve/main/google_gemma-3-4b-it-Q4_1.gguf
          - runner: warp-ubuntu-latest-x64-4x
            manylinux_target: manylinux_2_34_x86_64
          - runner: warp-ubuntu-latest-arm64-4x
            manylinux_target: manylinux_2_34_aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: "Download wheel"
        uses: actions/download-artifact@v5
        with:
          name: nobodywho_python_linux_${{ matrix.manylinux_target }}
          path: ./wheels

      - name: Install wheel
        run: |
          python3 -m venv maturinvenv
          source ./maturinvenv/bin/activate
          pip install wheels/nobodywho*.whl

      - name: Download models
        run: |
          mkdir -p linux/nobodypython/models
          curl -L --fail --progress-bar ${{ matrix.model_link }} -o linux/nobodypython/models/${{ matrix.model_name }}

      - name: Run small model in python
        run: |
          source ./maturinvenv/bin/activate
          chmod +x nobodywho/python/tests/test_reliability.sh
          bash nobodywho/python/tests/test_reliability.sh -n ${{ matrix.model_iterations }} nobodywho/python/examples/small_model_demo.py "linux/nobodypython/models/${{ matrix.model_name }}"

  windows-pip-install-test:
    if: inputs.full_ci
    needs: [windows-build]
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest]
        model: [Gemma]
