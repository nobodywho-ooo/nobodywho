name: "Trigger full CI from PR comment"

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    if: >-
      github.event.issue.pull_request
      && github.event.comment.body == '/full-ci'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: write
      issues: write
    steps:
      - name: Check permissions
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            // permission field uses legacy mapping: maintain→write, triage→read
            const allowed = ['admin', 'write'].includes(data.permission);
            core.setOutput('allowed', allowed);

      - name: Get PR head ref
        if: steps.auth.outputs.allowed == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('had_full_ci_label', pr.data.labels.some((label) => label.name === 'full-ci'));

      - name: Trigger full CI
        if: steps.auth.outputs.allowed == 'true'
        id: dispatch
        uses: actions/github-script@v7
        with:
          script: |
            const ref = ${{ toJSON(steps.pr.outputs.ref) }};
            const sha = ${{ toJSON(steps.pr.outputs.sha) }};
            const startedAt = Date.now();

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'full-ci',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'full-ci',
                color: '5319e7',
                description: 'Run the full CI suite for this pull request',
              });
            }

            if (${{ toJSON(steps.pr.outputs.had_full_ci_label) }} === 'true') {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'full-ci',
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['full-ci'],
            });

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

            for (let attempt = 0; attempt < 10; attempt++) {
              await new Promise((resolve) => setTimeout(resolve, 3000));
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'main.yml',
                branch: ref,
                event: 'pull_request',
                per_page: 10,
              });
              const run = data.workflow_runs.find((workflowRun) => workflowRun.head_sha === sha && Date.parse(workflowRun.created_at) >= startedAt - 60000);
              if (run) {
                core.setOutput('url', run.html_url);
                return;
              }
            }

            throw new Error(`Full CI run was not found for ${ref} at ${sha}`);

      - name: Comment workflow link
        if: steps.auth.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = ${{ toJSON(steps.dispatch.outputs.url) }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Full CI triggered: ${url}`,
            });

      - name: Remove full-ci label
        if: always() && steps.auth.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'full-ci',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
