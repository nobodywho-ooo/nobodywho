<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>nobodywho-js — chat (Worker)</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; }
    textarea { width: 100%; padding: 0.4em; font: inherit; box-sizing: border-box; min-height: 4em; }
    pre { background: #f4f4f4; padding: 1em; white-space: pre-wrap; word-break: break-word; max-height: 50vh; overflow: auto; }
    button { padding: 0.4em 1em; }
  </style>
</head>
<body>
  <h1>nobodywho-js — chat (Worker)</h1>
  <p>
    Wasm runs in a Web Worker, so tokens are rendered as they're produced.
    Pick a chat GGUF, type a prompt, click Ask. Follow-up Asks continue
    the same conversation (the worker keeps the chat session alive).
  </p>

  <p>
    <input id="model" type="file" accept=".gguf" />
    <button id="ask" disabled>Ask</button>
  </p>
  <textarea id="prompt">What is 2 + 2? Answer in one sentence.</textarea>
  <pre id="out">Loading wasm…</pre>

  <script type="module">
    const $model = document.getElementById('model');
    const $askBtn = document.getElementById('ask');
    const $prompt = document.getElementById('prompt');
    const $out = document.getElementById('out');

    // Track whether the worker has a live `Chat` instance. Created once
    // on the first Ask and reused so follow-ups see full conversation
    // history. Reload the page (or wire a "New chat" button) for a fresh
    // session.
    let chatReady = false;

    const worker = new Worker(new URL('./worker.js', import.meta.url), { type: 'module' });

    worker.onmessage = (e) => {
      const m = e.data;
      switch (m.type) {
        case 'ready':        $out.textContent = 'Wasm ready. Pick a GGUF.'; break;
        case 'model-loaded': $out.textContent = 'Model loaded. Click Ask.'; $askBtn.disabled = false; break;
        case 'chat-ready':   break;  // handled by onceChatReady inside the Ask handler
        case 'token':        $out.append(m.token); break;
        case 'ask-done':     $askBtn.disabled = false; break;
        case 'error':        $out.append(`\n[error: ${m.message}]`); $askBtn.disabled = false; break;
      }
    };
    worker.onerror = (e) => $out.append(`\n[worker crashed: ${e.message}]`);

    $model.addEventListener('change', async () => {
      const file = $model.files[0];
      if (!file) return;
      $out.textContent = `Loading model (${(file.size / 1e6).toFixed(0)} MB)…`;
      const bytes = new Uint8Array(await file.arrayBuffer());
      // Transfer the underlying buffer (zero-copy); after this `bytes`
      // is empty on the main thread.
      worker.postMessage({ type: 'load-model', bytes }, [bytes.buffer]);
    });

    $askBtn.addEventListener('click', () => {
      $askBtn.disabled = true;
      // First turn: clear the output. Follow-ups: append a separator so
      // the visible transcript matches the conversation history the
      // worker is maintaining.
      if (!chatReady) {
        $out.textContent = '';
      } else {
        $out.append('\n---\n');
      }
      const sendAsk = () => worker.postMessage({ type: 'ask', prompt: $prompt.value });
      if (chatReady) { sendAsk(); return; }

      worker.postMessage({
        type: 'create-chat',
        options: { contextSize: 2048, systemPrompt: 'You are a concise, helpful assistant.' },
      });
      // One-shot listener: resolves on success OR error. Without the
      // 'error' branch, a failed create-chat would leak this listener
      // and the next successful Ask would fire sendAsk() twice.
      const onceChatReady = (e) => {
        if (e.data.type === 'chat-ready') {
          worker.removeEventListener('message', onceChatReady);
          chatReady = true;
          sendAsk();
        } else if (e.data.type === 'error') {
          worker.removeEventListener('message', onceChatReady);
        }
      };
      worker.addEventListener('message', onceChatReady);
    });
  </script>
</body>
</html>
