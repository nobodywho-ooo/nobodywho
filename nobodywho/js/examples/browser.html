<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>nobodywho-js — encoder demo</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; }
    pre  { background: #f4f4f4; padding: 1em; white-space: pre-wrap; word-break: break-word; max-height: 60vh; overflow: auto; }
    button { padding: 0.4em 1em; }
  </style>
</head>
<body>
  <h1>nobodywho-js — encoder demo</h1>
  <p>
    Pick an embedding GGUF (e.g. bge-small-en-v1.5) and click Run. Serve
    from <code>nobodywho/js/</code> over HTTP so the relative wasm paths
    resolve.
  </p>

  <p>
    <label>GGUF: <input id="model" type="file" accept=".gguf" /></label><br />
    <label>Text: <input id="text" value="Hello from the browser." size="40" /></label><br />
    <button id="go">Run</button>
  </p>

  <pre id="out"></pre>

  <script type="module">
    import { Model, Encoder } from './setup-browser.mjs';

    const out = document.getElementById('out');
    const log = (s) => { out.textContent += s + '\n'; };

    document.getElementById('go').addEventListener('click', async () => {
      out.textContent = '';
      const file = document.getElementById('model').files[0];
      const text = document.getElementById('text').value;
      if (!file) { log('Pick a GGUF first.'); return; }

      try {
        log(`Loading model (${(file.size / 1024 / 1024).toFixed(1)} MB)…`);
        const model = await Model.loadBytes(new Uint8Array(await file.arrayBuffer()));
        const encoder = new Encoder(model, 512);

        log(`Encoding: ${JSON.stringify(text)}`);
        const vec = await encoder.encode(text);
        log(`Embedding dimension: ${vec.length}`);
        log(`first 8: [${Array.from(vec.slice(0, 8)).map((v) => v.toFixed(4)).join(', ')}]`);
      } catch (e) {
        log(`Error: ${e.message ?? e}`);
        console.error(e);
      }
    });
  </script>
</body>
</html>
