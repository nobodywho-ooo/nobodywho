<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>chat (streaming)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; }
    #status { color: #666; font-size: 0.9em; }
    #out { white-space: pre-wrap; background: #f6f6f6; padding: 1rem; border-radius: 4px; min-height: 4em; }
  </style>
</head>
<body>
  <h1>NobodyWho — token streaming</h1>
  <p id="status">loading wasm…</p>
  <pre id="out"></pre>

  <script type="module">
    const status = document.getElementById('status');
    const out = document.getElementById('out');

    const { default: createNobodyWhoModule } = await import('../pkg-bundler/nobodywho_js.js');
    const m = await createNobodyWhoModule();
    m.init();

    status.textContent = 'fetching / loading model (~480 MB; cached after first run)…';
    const chat = await m.Chat.create({
      modelUrl: 'https://huggingface.co/NobodyWho/Qwen_Qwen3-0.6B-GGUF/resolve/main/Qwen_Qwen3-0.6B-Q4_K_M.gguf',
      systemPrompt: 'You are a helpful assistant.',
      templateVariables: { enable_thinking: false },
      onDownloadProgress: (done, total) => {
        if (total > 0) {
          const pct = ((done / total) * 100).toFixed(1);
          status.textContent = `downloading model: ${pct}% (${(done / 1e6).toFixed(1)}/${(total / 1e6).toFixed(1)} MB)`;
        }
      },
    });

    status.textContent = 'streaming…';
    const t0 = performance.now();
    let ttftMs = null;

    // Consume tokens one at a time via stream.next(). Each call resolves
    // when the worker postMessages the next token; the per-token sync
    // hook in core fires those messages from inside the inference loop,
    // which is what makes this visibly stream on wasm (the channel-based
    // path can't stream on a single-threaded worker).
    const stream = chat.ask('Write a short paragraph about Copenhagen, Denmark — its history, harbor, and cycling culture.');
    while (true) {
      const { value, done } = await stream.next();
      if (done) break;
      if (ttftMs === null) {
        ttftMs = performance.now() - t0;
      }
      out.textContent += value;
    }

    const totalMs = performance.now() - t0;
    status.textContent = `done — ttft ${ttftMs?.toFixed(0)} ms, total ${totalMs.toFixed(0)} ms`;
    await chat.terminate();
  </script>
</body>
</html>
