<!doctype html>
<html>
<head><meta charset="utf-8" /><title>encoder</title></head>
<body>
  <pre id="out"></pre>
  <script type="module">
    import { Model, Encoder, fetchModelBytes } from './setup-browser.mjs';

    const bytes = await fetchModelBytes(
      'https://huggingface.co/CompendiumLabs/bge-small-en-v1.5-gguf/resolve/main/bge-small-en-v1.5-q8_0.gguf',
    );
    const model = await Model.loadBytes(bytes);
    const encoder = new Encoder(model, 2048);

    const texts = [
      'The quick brown fox jumps over the lazy dog.',
      'A fast brown fox leaps over the sleepy dog.',
      'The weather is sunny today.',
      'Machine learning is a subset of artificial intelligence.',
      'Deep learning uses neural networks with many layers.',
    ];

    const embeddings = [];
    for (const text of texts) embeddings.push(await encoder.encode(text));

    // Python has nobodywho.cosine_similarity; the JS binding doesn't, so inline it.
    const cosine = (a, b) => {
      let dot = 0, na = 0, nb = 0;
      for (let i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        na += a[i] * a[i];
        nb += b[i] * b[i];
      }
      return dot / Math.sqrt(na * nb);
    };

    const out = document.getElementById('out');
    for (let i = 0; i < texts.length; i++) {
      for (let j = i + 1; j < texts.length; j++) {
        out.append(`${i + 1} vs ${j + 1}: ${cosine(embeddings[i], embeddings[j]).toFixed(3)}\n`);
      }
    }
  </script>
</body>
</html>
