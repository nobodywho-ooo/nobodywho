[package]
name = "nobodywho"
version = "2.2.0"
edition = "2021"

[dependencies]
encoding_rs = "0.8.34"
thiserror = "2.0.3"
minijinja = { version = "2.11.0", features = ["builtins", "json", "loader"] }
minijinja-contrib = { version = "2.11.0", features = ["pycompat"] }
monty = { git = "https://github.com/pydantic/monty", tag = "v0.0.7" }
bashkit = { git = "https://github.com/everruns/bashkit", tag = "v0.1.10" }
serde = { version = "1.0.215", features = ["derive"] }
chrono = "0.4.39"
llama-cpp-2 = { git = "https://github.com/marek-hradil/llama-cpp-rs", branch = "main", default-features = false, features = [
    "openmp",
    "android-static-stdcxx",
    "mtmd",
    "llguidance",
] }
lazy_static = "1.5.0"
tokio = { version = "1.43.0", features = [
    "sync",
    "rt",
    "rt-multi-thread",
    "macros",
] }
tokio-stream = "0.1.17"
tracing = { version = "0.1.41", features = ["log"] }
tracing-subscriber = "0.3.19"
regex = "1.11.1"
serde_json = "1.0.140"
gbnf = { path = "../grammar/gbnf" }
gbnf-macro = { path = "../grammar/gbnf-macro" }
nom = "8.0.0"
rand = "0.9.3"
futures = "0.3.31"
ahash = "0.8.12"
indexmap = "2.13.0"
libc = "0.2"
ureq = { version = "3", features = ["rustls"] }
indicatif = "0.18"

[target.'cfg(not(target_os = "android"))'.dependencies]
dirs = "6"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_System_LibraryLoader"] }

# Linux + Windows x86_64/x86/aarch64: dynamic backends + Vulkan.
# Excludes Apple platforms (Metal is auto-enabled by llama-cpp-rs; macOS gets its own section below)
# and Android (has its own section below).
[target.'cfg(all(not(target_os = "macos"), not(target_os = "ios"), not(target_os = "visionos"), not(target_os = "watchos"), not(target_os = "android"), any(target_arch = "x86_64", target_arch = "x86", target_arch = "aarch64")))'.dependencies]
llama-cpp-2 = { git = "https://github.com/marek-hradil/llama-cpp-rs", branch = "main", default-features = false, features = [
    "dynamic-backends",
    "openmp",
    "vulkan",
    "mtmd",
    "android-static-stdcxx",
    "llguidance",
] }

# macOS: dynamic backends. Metal is auto-enabled by llama-cpp-rs for all Apple targets.
[target.'cfg(target_os = "macos")'.dependencies]
llama-cpp-2 = { git = "https://github.com/marek-hradil/llama-cpp-rs", branch = "main", default-features = false, features = [
    "dynamic-backends",
    "openmp",
    "mtmd",
    "android-static-stdcxx",
    "llguidance",
] }

# Android: dynamic backends + Vulkan (for devices that support it; falls back to CPU otherwise).
[target.'cfg(target_os = "android")'.dependencies]
llama-cpp-2 = { git = "https://github.com/marek-hradil/llama-cpp-rs", branch = "main", default-features = false, features = [
    "dynamic-backends",
    "openmp",
    "vulkan",
    "android-static-stdcxx",
    "mtmd",
    "llguidance",
] }

# iOS: static-only linkage. dlopen of arbitrary dylibs is forbidden on iOS, so no dynamic-backends.
# Metal is auto-enabled by llama-cpp-rs for all Apple targets.
[target.'cfg(target_os = "ios")'.dependencies]
llama-cpp-2 = { git = "https://github.com/marek-hradil/llama-cpp-rs", branch = "main", default-features = false, features = [
    "metal",
    "mtmd",
    "llguidance",
] }
