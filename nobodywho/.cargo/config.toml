# Runtime discovery for the dynamically-linked ggml/llama libs (dynamic-link
# feature). The fork ships them next to each built artifact but emits no rpath, so
# bake $ORIGIN / @loader_path into everything we link to find the co-located libs.
#
# Cargo uses only ONE rustflags source: the RUSTFLAGS env var wins over this config.
# CI sets RUSTFLAGS, so it must append the same rpath there (see .github/workflows);
# this covers local dev/test/build. Android resolves from jniLibs; Windows from the
# loading module's dir.

[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-Wl,-rpath,$ORIGIN"]

[target.'cfg(target_vendor = "apple")']
rustflags = ["-C", "link-arg=-Wl,-rpath,@loader_path"]

[env]
# Disable OpenSSL in llama.cpp's cpp-httplib. dynamic-link builds `common` as a
# shared lib, forcing its TLS symbols to resolve, but the x86_64-apple-darwin cross
# build has no host OpenSSL to link. We don't use the HTTPS downloader, so inject a
# snippet (the fork forwards CMAKE_-prefixed env as -D) that forces LLAMA_OPENSSL
# off before llama.cpp's option() runs. relative = true: path is vs the .cargo dir.
CMAKE_PROJECT_INCLUDE = { value = "scripts/disable-llama-openssl.cmake", relative = true }
