# Per-target rustflags for wasm builds:
# - +atomics,+bulk-memory,+mutable-globals: enable Emscripten pthreads,
#   so llama.cpp can multi-thread its matmuls inside the wasm instance.
# - panic=abort: wasm-bindgen requires `Closure` callbacks to be
#   UnwindSafe, but our `Chat` captures `Rc<RefCell<ChatState>>` in its
#   Worker callbacks (not RefUnwindSafe). Abort drops that requirement;
#   a panic tears down the module, like an unrecoverable ggml exception.
[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "panic=abort",
    "-C", "target-feature=+atomics,+bulk-memory,+mutable-globals",
]
