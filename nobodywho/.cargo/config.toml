# Per-target rustflags for the nobodywho workspace.
#
# Currently empty — wasm32-unknown-emscripten is built single-threaded
# (no `-pthread` / `+atomics`), so the prebuilt std works and no special
# rustflags are needed. The off-main-thread story is delegated to the JS
# host spawning a Web Worker. Stable Rust suffices.
#
# Why not multi-threaded: Emscripten's pthread runtime conflicts with
# wasm-bindgen-cli's thread-id injection. See llama-cpp-rs/llama-cpp-
# sys-2/build.rs (WasmEmscripten branch) and js/build.rs for the
# matching reasoning.
