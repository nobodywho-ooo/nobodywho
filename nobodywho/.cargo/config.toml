# Both whisper-rs-sys and llama-cpp-sys-2 bundle their own copy of ggml.c.
# When linking a cdylib, the linker sees duplicate symbols.
# In Nix builds this is fixed by deleting whisper's ggml archives in the
# whisper-rs-sys postInstall hook (see workspace.nix). For non-Nix cargo
# builds on Linux, tell the linker to silently pick one definition.
[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-Wl,--allow-multiple-definition"]
