buildscript {
  // Buildscript is evaluated before everything else so we can't use getExtOrDefault
  def kotlin_version = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : project.properties["DummyLibForAndroid_kotlinVersion"]

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:7.2.1"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["Nobodywho_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["Nobodywho_" + name]).toInteger()
}

def supportsNamespace() {
  def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
  def major = parsed[0].toInteger()
  def minor = parsed[1].toInteger()

  // Namespace support was added in 7.3.0
  return (major == 7 && minor >= 3) || major >= 8
}

// ABI to Rust target triple mapping
def abiToTriple = [
  "arm64-v8a": "aarch64-linux-android",
  "x86_64": "x86_64-linux-android",
]

// Read version from package.json
def packageJsonFile = file("${projectDir}/../package.json")
def packageJson = new groovy.json.JsonSlurper().parseText(packageJsonFile.text)
def nobodywhoVersion = packageJson.version

// Directory for downloaded native libraries (outside source tree to avoid Gradle conflicts)
def nativeLibsDir = new File(buildDir, "nobodywho-native")

// Download native static libraries from GitHub Releases if not already present.
// These are .a files used by CMake at link time — not .so files for jniLibs.
task resolveNativeLibraries {
  description = "Downloads NobodyWho native static libraries from GitHub Releases"

  outputs.dir(nativeLibsDir)

  doLast {
    abiToTriple.each { abi, triple ->
      def abiDir = new File(nativeLibsDir, abi)
      def libFile = new File(abiDir, "libnobodywho_uniffi.a")

      if (libFile.exists()) {
        logger.lifecycle("[NobodyWho] ${abi}: Using existing library at ${libFile.path}")
        return
      }

      abiDir.mkdirs()

      def fileName = "libnobodywho-uniffi-${triple}-release.a"
      def downloadUrl = "https://github.com/nobodywho-ooo/nobodywho/releases/download/nobodywho-react-native-${nobodywhoVersion}/${fileName}"

      logger.lifecycle("[NobodyWho] ${abi}: Downloading from ${downloadUrl}")

      try {
        // Follow redirects manually to handle cross-protocol redirects
        // (GitHub redirects from github.com to objects.githubusercontent.com)
        def url = downloadUrl
        def maxRedirects = 5
        for (int i = 0; i < maxRedirects; i++) {
          def connection = (java.net.HttpURLConnection) new URL(url).openConnection()
          connection.setInstanceFollowRedirects(false)
          connection.connect()

          def code = connection.responseCode
          if (code == 200) {
            libFile.withOutputStream { out ->
              out << connection.inputStream
            }
            logger.lifecycle("[NobodyWho] ${abi}: Downloaded to ${libFile.path} (${libFile.length()} bytes)")
            return
          } else if (code == 301 || code == 302 || code == 307 || code == 308) {
            url = connection.getHeaderField("Location")
            connection.disconnect()
          } else {
            throw new GradleException(
              "Failed to download NobodyWho library for ${abi}: HTTP ${code}\n" +
              "URL: ${downloadUrl}\n" +
              "Check that the release exists: https://github.com/nobodywho-ooo/nobodywho/releases/tag/nobodywho-react-native-${nobodywhoVersion}"
            )
          }
        }
        throw new GradleException("Too many redirects downloading NobodyWho library for ${abi}")
      } catch (GradleException e) {
        throw e
      } catch (Exception e) {
        throw new GradleException(
          "Failed to download NobodyWho library for ${abi}: ${e.message}\n" +
          "For local development, build the uniffi crate and place the .a file at: ${libFile.path}",
          e
        )
      }
    }
  }
}

android {
  if (supportsNamespace()) {
    namespace "com.nobodywho"

    sourceSets {
      main {
        manifest.srcFile "src/main/AndroidManifestNew.xml"
      }
    }
  }

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
    consumerProguardFiles 'proguard-rules.pro'

    buildFeatures {
      prefab true
    }
    externalNativeBuild {
      cmake {
        arguments '-DANDROID_STL=c++_shared',
                  "-DNOBODYWHO_NATIVE_LIBS_DIR=${nativeLibsDir.absolutePath}"
        abiFilters (*reactNativeArchitectures())
      }
    }
    ndk {
      abiFilters "arm64-v8a", "armeabi-v7a", "x86", "x86_64"
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      if (isNewArchitectureEnabled()) {
          java.srcDirs += [
            "generated/java",
            "generated/jni"
          ]
      }
    }
  }
}

// Ensure native libraries are downloaded before CMake runs
afterEvaluate {
  tasks.matching {
    it.name.contains("configureCMake") || it.name.contains("externalNativeBuild")
  }.configureEach {
    dependsOn(resolveNativeLibraries)
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/")
    libraryName = "Nobodywho"
    codegenJavaPackageName = "com.nobodywho"
  }
}
