[workspace]
members = [
    "core",
    "godot",
    "flutter/rust",
    "python",
    "grammar/gbnf",
    "grammar/gbnf-macro",
]

# edition = "2021" implies resolver = "2".
resolver = "2"

[patch.crates-io]
llama-cpp-2 = { git = "https://github.com/utilityai/llama-cpp-rs.git", branch = "android-static-stdcxx" }
llama-cpp-sys-2 = { git = "https://github.com/utilityai/llama-cpp-rs.git", branch = "android-static-stdcxx" }
