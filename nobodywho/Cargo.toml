[workspace]
members = [
    "core",
    "godot",
    "flutter/rust",
    "python",
    "grammar/gbnf",
    "grammar/gbnf-macro",
    "uniffi",
]

# edition = "2021" implies resolver = "2".
resolver = "2"

# Pinned to a specific pyo3 commit because pyo3-introspection's support for including
# docstrings in generated type stubs (PR #5782) landed on main but hasn't been released yet.
# Remove this once pyo3 0.29 (or whichever release includes it) is published.
# Pinning to a rev (rather than a branch) keeps Cargo.nix regeneration deterministic —
# crate-hashes.json keys by the URL spec, so a mutable branch ref produces stale-hash mismatches.
[patch.crates-io]
pyo3 = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
pyo3-ffi = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
pyo3-macros = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
pyo3-macros-backend = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
pyo3-build-config = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
pyo3-introspection = { git = "https://github.com/PyO3/pyo3", rev = "a2fd837fc84fb30b4ea147e0fe9acbe19b28997e" }
