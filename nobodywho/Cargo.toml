[workspace]
members = [
    "core",
    "godot",
    "flutter/rust",
    "python",
    "grammar/gbnf",
    "grammar/gbnf-macro",
    "uniffi",
    "js",
]

# edition = "2021" implies resolver = "2".
resolver = "2"

# Patched to git main because pyo3-introspection's support for including docstrings
# in generated type stubs (PR #5782) landed on main but hasn't been released yet.
# Remove this once pyo3 0.29 (or whichever release includes it) is published.
[patch.crates-io]
pyo3 = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-ffi = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-macros = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-macros-backend = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-build-config = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-introspection = { git = "https://github.com/PyO3/pyo3", branch = "main" }
# wasm-bindgen pinned to nobodywho-ooo/wasm-bindgen branch
# `wasm-emscripten-0.2.122`: stock upstream 0.2.122 (which absorbed our
# descriptor-interpreter tolerance + the `__wasm_bindgen_emscripten_marker`
# / library_bindgen.js Emscripten output mode) plus the one remaining fix â€”
# skip wasm-bindgen's `__heap_base`-based thread transform under Emscripten
# (Emscripten manages its own pthread runtime). The whole family is pinned to
# the same branch: 0.2.122 isn't on crates.io yet and js-sys/web-sys/futures
# exact-pin `=0.2.122`. Drop once the pthread fix lands upstream.
#
# TEMPORARY (wasm64 bring-up): redirected from git to a local clone of the
# fork's `wasm64-emscripten` branch, which adds the one missing wasm64 fix â€”
# js-sys's multithreaded-futures waker hardcoded `core::arch::wasm32`, which
# doesn't exist on wasm64 (the rest of wasm-bindgen is already memory64-aware).
# Same temporary-override pattern as the llama-cpp-rs `[patch]` above; push the
# branch and restore the git pins once it's merged.
wasm-bindgen = { path = "../../wasm-bindgen" }
wasm-bindgen-futures = { path = "../../wasm-bindgen/crates/futures" }
js-sys = { path = "../../wasm-bindgen/crates/js-sys" }
web-sys = { path = "../../wasm-bindgen/crates/web-sys" }

# llama-cpp-2 / llama-cpp-sys-2 are pulled directly from the
# `nobodywho-ooo/llama-cpp-rs` `wasm-emscripten` branch via the
# git+branch declarations in `core/Cargo.toml`.
#
# TEMPORARY (wasm64 bring-up): redirect both crates to a local clone of the
# fork's `wasm64-emscripten` branch, which teaches `llama-cpp-sys-2/build.rs`
# to recognize `wasm64-unknown-emscripten` and emit `-sMEMORY64=1` +
# `LLAMA_WASM_MEM64=ON`. The edits are gated on `is_wasm64_emscripten()`, so
# every non-wasm64 target (native, wasm32, â€¦) compiles byte-for-byte as before.
# The clone is expected as a sibling checkout; init its llama.cpp submodule.
# Once `wasm64-emscripten` is pushed to nobodywho-ooo/llama-cpp-rs, delete this
# block and bump the rev on the git+branch pins in `core/Cargo.toml` instead.
[patch."https://github.com/nobodywho-ooo/llama-cpp-rs"]
llama-cpp-2 = { path = "../../llama-cpp-rs/llama-cpp-2" }
llama-cpp-sys-2 = { path = "../../llama-cpp-rs/llama-cpp-sys-2" }
