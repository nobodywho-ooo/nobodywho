[workspace]
members = [
    "core",
    "godot",
    "flutter/rust",
    "python",
    "grammar/gbnf",
    "grammar/gbnf-macro",
    "uniffi",
    "js",
]

# edition = "2021" implies resolver = "2".
resolver = "2"

# Patched to git main because pyo3-introspection's support for including docstrings
# in generated type stubs (PR #5782) landed on main but hasn't been released yet.
# Remove this once pyo3 0.29 (or whichever release includes it) is published.
[patch.crates-io]
pyo3 = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-ffi = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-macros = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-macros-backend = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-build-config = { git = "https://github.com/PyO3/pyo3", branch = "main" }
pyo3-introspection = { git = "https://github.com/PyO3/pyo3", branch = "main" }
# wasm-bindgen 0.2.121 stock crates.io release predates the upstream
# `__wasm_bindgen_emscripten_marker` custom section that the patched CLI
# uses to switch to Emscripten output mode (library_bindgen.js + addToLibrary
# format). Without the marker the CLI emits bundler-shape output, which
# emcc-wbg's -sWASM_BINDGEN post-link step then can't find — silently
# leaving pkg-bundler stale. Point the runtime at the local fork (which is
# upstream main + the descriptor-interpreter cli-support tolerance patch)
# so the marker section is emitted into the compiled wasm.
wasm-bindgen = { path = "/Users/user/git/wasm-bindgen" }

# Local-checkout override for llama-cpp-rs while the wasm-emscripten branch
# carries unpublished commits (CMAKE_SYSTEM_PROCESSOR=wasm32 fix + mtmd
# `MA_NO_*` defines). Remove this block once those commits land on the
# remote `wasm-emscripten` branch and the regular git+branch dep above
# resolves to them. The path is hardcoded to a sibling checkout; if your
# clone lives elsewhere, adjust or push your branch.
[patch."https://github.com/nobodywho-ooo/llama-cpp-rs"]
llama-cpp-2 = { path = "/Users/user/git/llama-cpp-rs/llama-cpp-2" }
llama-cpp-sys-2 = { path = "/Users/user/git/llama-cpp-rs/llama-cpp-sys-2" }
