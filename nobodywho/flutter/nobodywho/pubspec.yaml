name: nobodywho
description: "On-device AI for mobile & desktop — text, embeddings, RAG & function calling. Run GGUF models with Metal/Vulkan acceleration. Free for commercial use."
version: 0.4.0
repository: https://github.com/nobodywho-ooo/nobodywho
issue_tracker: https://github.com/nobodywho-ooo/nobodywho/issues
documentation: https://docs.nobodywho.ooo/
homepage: https://docs.nobodywho.ooo/

topics:
  - ai
  - llm
  - genai
  - inference
  - local-ai

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  flutter_rust_bridge: ^2.11.1
  ffi: ^2.1.4
  freezed_annotation: ^3.1.0

dev_dependencies:
  ffigen: ^19.1.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.6
  freezed: ^3.2.3
  build_runner: ^2.4.13

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true